<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Workout Hub & Coaching Dashboard</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
            --accent-hover: #0284c7;
            --success-color: #22c55e;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
            --border-color: #334155;
            --subtext-color: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 24px;
            max-width: 1300px;
            margin: 0 auto;
            min-height: 100vh;
        }

        header {
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        h1 {
            font-size: 1.8rem;
            color: var(--accent-color);
        }

        .subtitle {
            color: var(--subtext-color);
            font-size: 0.9rem;
            margin-top: 4px;
        }

        /* Toolbar & Selectors */
        .toolbar {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: space-between;
        }

        .toolbar-group {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        label {
            font-size: 0.85rem;
            color: var(--subtext-color);
            font-weight: 600;
        }

        select, input {
            background-color: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.9rem;
            outline: none;
        }

        select:focus, input:focus {
            border-color: var(--accent-color);
        }

        button {
            background-color: var(--accent-color);
            color: var(--bg-color);
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        button.btn-secondary {
            background-color: #334155;
            color: var(--text-color);
        }

        button.btn-secondary:hover {
            background-color: #475569;
        }

        button.danger {
            background-color: var(--danger-color);
            color: white;
        }

        button.danger:hover {
            background-color: #dc2626;
        }

        /* Grid Layout */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .athlete-name {
            font-size: 1.1rem;
            font-weight: bold;
        }

        .vdot-badge {
            background-color: #334155;
            color: var(--accent-color);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .target-pace {
            font-size: 0.85rem;
            color: var(--subtext-color);
            background-color: var(--bg-color);
            padding: 6px 10px;
            border-radius: 4px;
            border-left: 3px solid var(--accent-color);
        }

        .timer-display {
            font-size: 2.4rem;
            font-family: monospace;
            font-weight: bold;
            text-align: center;
            margin: 8px 0;
            color: var(--accent-color);
        }

        .card-actions {
            display: flex;
            gap: 8px;
        }

        .card-actions button {
            flex: 1;
            justify-content: center;
        }

        .splits-list {
            list-style: none;
            max-height: 140px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 8px 12px;
            background-color: var(--bg-color);
            font-family: monospace;
            font-size: 0.85rem;
        }

        .splits-list li {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px dashed #334155;
        }

        .splits-list li:last-child {
            border-bottom: none;
        }

        /* Insights Panel */
        .insights-panel {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            margin-top: 24px;
        }

        .insights-header {
            font-size: 1.1rem;
            margin-bottom: 16px;
            color: var(--accent-color);
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
        }

        .metric-item {
            background-color: var(--bg-color);
            padding: 14px;
            border-radius: 6px;
            border-left: 4px solid var(--accent-color);
        }

        .metric-label {
            font-size: 0.85rem;
            color: var(--subtext-color);
            margin-bottom: 6px;
        }

        .metric-value {
            font-size: 1.2rem;
            font-weight: bold;
        }

        .flag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            margin-top: 6px;
        }

        .flag-success {
            background-color: rgba(34, 197, 94, 0.2);
            color: var(--success-color);
        }

        .flag-warning {
            background-color: rgba(245, 158, 11, 0.2);
            color: var(--warning-color);
        }
    </style>
</head>
<body>

    <header>
        <div>
            <h1>Track Workout Hub</h1>
            <p class="subtitle">Real-time Split Tracking & Physiological Target Math</p>
        </div>
        <div style="display: flex; gap: 10px;">
            <button id="start-all-btn">▶ Start All Timers</button>
            <button id="reset-all-btn" class="danger">↺ Reset Session</button>
        </div>
    </header>

    <!-- Workout Selector & Export Toolbar -->
    <div class="toolbar">
        <div class="toolbar-group">
            <div>
                <label for="workout-type">Active Session Presets:</label><br>
                <select id="workout-type" onchange="updateWorkoutTargets()">
                    <option value="400_interval">8x 400m @ I-Pace (Interval)</option>
                    <option value="1000_threshold">5x 1000m @ T-Pace (Threshold)</option>
                    <option value="200_repetition">10x 200m @ R-Pace (Repetition)</option>
                    <option value="custom">Custom Free Run</option>
                </select>
            </div>
            <div>
                <label for="new-athlete-name">Add Runner:</label><br>
                <input type="text" id="new-athlete-name" placeholder="Name..." style="width: 130px;">
                <input type="number" id="new-athlete-vdot" placeholder="VDOT" value="52" style="width: 70px;">
                <button onclick="addAthleteFromInput()" class="btn-secondary">+ Add</button>
            </div>
        </div>

        <div class="toolbar-group">
            <button onclick="exportDataCSV()" class="btn-secondary">📥 Export CSV</button>
            <button onclick="exportDataJSON()" class="btn-secondary">💾 Export JSON</button>
        </div>
    </div>

    <!-- Runner Cards Grid -->
    <div class="grid" id="runner-grid"></div>

    <!-- Workout Insights Panel -->
    <div class="insights-panel">
        <div class="insights-header">
            <span>📊</span> Workout Insights Panel
        </div>
        <div class="metrics-grid">
            <div class="metric-item">
                <div class="metric-label">Group Target Compliance</div>
                <div class="metric-value" id="group-compliance">95% On Pace</div>
                <div class="flag flag-success">Target Zone Met</div>
            </div>
            <div class="metric-item">
                <div class="metric-label">VDOT Progression Flag</div>
                <div class="metric-value" id="vdot-flag">2 Athletes Ready</div>
                <div class="flag flag-warning">Bump VDOT Target</div>
            </div>
            <div class="metric-item">
                <div class="metric-label">Performance Decay Alert</div>
                <div class="metric-value" id="decay-alert">None Detected</div>
                <div class="flag flag-success">Pacing Stable</div>
            </div>
        </div>
    </div>

    <script>
        // State
        let running = false;
        let startTime = 0;
        let elapsedTime = 0;
        let timerInterval = null;

        // Default roster with VDOT scores
        let athletes = [
            { id: 1, name: "Athlete 1", vdot: 54, splits: [] },
            { id: 2, name: "Athlete 2", vdot: 52, splits: [] },
            { id: 3, name: "Athlete 3", vdot: 48, splits: [] }
        ];

        // Target calculations per VDOT
        function getTargetPace(vdot, workoutType) {
            // Simplified VDOT target lookup for demo calculations
            const factor = (60 - vdot) * 0.8;
            if (workoutType === '400_interval') {
                const targetSec = 72 + factor;
                return `${targetSec.toFixed(1)}s / 400m`;
            } else if (workoutType === '1000_threshold') {
                const targetSec = 215 + (factor * 2.5);
                const min = Math.floor(targetSec / 60);
                const sec = (targetSec % 60).toFixed(0).padStart(2, '0');
                return `${min}:${sec} / 1000m`;
            } else if (workoutType === '200_repetition') {
                const targetSec = 34 + (factor * 0.5);
                return `${targetSec.toFixed(1)}s / 200m`;
            }
            return "Free Pacing";
        }

        function formatTime(ms) {
            const totalSeconds = Math.floor(ms / 1000);
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;
            const tenths = Math.floor((ms % 1000) / 100);
            return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}.${tenths}`;
        }

        function renderAthletes() {
            const grid = document.getElementById('runner-grid');
            const workoutType = document.getElementById('workout-type').value;
            grid.innerHTML = '';

            athletes.forEach(athlete => {
                const target = getTargetPace(athlete.vdot, workoutType);
                const card = document.createElement('div');
                card.className = 'card';
                card.id = `card-${athlete.id}`;

                let splitsHTML = athlete.splits.map((s, idx) => 
                    `<li><span>Split ${idx + 1}</span><span>${s}</span></li>`
                ).reverse().join('');

                if (athlete.splits.length === 0) {
                    splitsHTML = '<li><span>Split 1</span><span>--:--</span></li>';
                }

                card.innerHTML = `
                    <div class="card-header">
                        <span class="athlete-name">${athlete.name}</span>
                        <span class="vdot-badge">VDOT: ${athlete.vdot}</span>
                    </div>
                    <div class="target-pace">🎯 Target: <strong>${target}</strong></div>
                    <div class="timer-display" id="timer-${athlete.id}">${formatTime(elapsedTime)}</div>
                    <div class="card-actions">
                        <button onclick="recordSplit(${athlete.id})">⏱ Record Split</button>
                        <button class="btn-secondary" onclick="removeAthlete(${athlete.id})">✕</button>
                    </div>
                    <ul class="splits-list" id="splits-${athlete.id}">
                        ${splitsHTML}
                    </ul>
                `;
                grid.appendChild(card);
            });
        }

        function updateTimers() {
            const now = Date.now();
            const currentMs = elapsedTime + (now - startTime);
            const formatted = formatTime(currentMs);

            athletes.forEach(athlete => {
                const timerEl = document.getElementById(`timer-${athlete.id}`);
                if (timerEl) timerEl.textContent = formatted;
            });
        }

        document.getElementById('start-all-btn').addEventListener('click', function() {
            if (!running) {
                running = true;
                startTime = Date.now();
                timerInterval = setInterval(updateTimers, 100);
                this.textContent = '⏸ Pause All';
                this.classList.add('danger');
            } else {
                running = false;
                elapsedTime += Date.now() - startTime;
                clearInterval(timerInterval);
                this.textContent = '▶ Start All Timers';
                this.classList.remove('danger');
            }
        });

        document.getElementById('reset-all-btn').addEventListener('click', function() {
            running = false;
            clearInterval(timerInterval);
            elapsedTime = 0;
            const startBtn = document.getElementById('start-all-btn');
            startBtn.textContent = '▶ Start All Timers';
            startBtn.classList.remove('danger');

            athletes.forEach(a => a.splits = []);
            renderAthletes();
        });

        function recordSplit(id) {
            const timerEl = document.getElementById(`timer-${id}`);
            const athlete = athletes.find(a => a.id === id);
            if (timerEl && athlete) {
                const splitVal = timerEl.textContent;
                athlete.splits.push(splitVal);
                renderAthletes();
            }
        }

        function updateWorkoutTargets() {
            renderAthletes();
        }

        function addAthleteFromInput() {
            const nameInput = document.getElementById('new-athlete-name');
            const vdotInput = document.getElementById('new-athlete-vdot');
            const name = nameInput.value.trim() || `Athlete ${athletes.length + 1}`;
            const vdot = parseInt(vdotInput.value) || 50;

            const newId = athletes.length > 0 ? Math.max(...athletes.map(a => a.id)) + 1 : 1;
            athletes.push({ id: newId, name: name, vdot: vdot, splits: [] });

            nameInput.value = '';
            renderAthletes();
        }

        function removeAthlete(id) {
            athletes = athletes.filter(a => a.id !== id);
            renderAthletes();
        }

        // --- Data Export Features ---
        function exportDataCSV() {
            let csv = "Athlete Name,VDOT,Split Number,Time\n";
            athletes.forEach(a => {
                if (a.splits.length === 0) {
                    csv += `"${a.name}",${a.vdot},No Splits recorded,--:--\n`;
                } else {
                    a.splits.forEach((s, idx) => {
                        csv += `"${a.name}",${a.vdot},Split ${idx + 1},${s}\n`;
                    });
                }
            });

            downloadBlob(csv, `track_workout_${new Date().toISOString().slice(0,10)}.csv`, 'text/csv');
        }

        function exportDataJSON() {
            const data = {
                workoutType: document.getElementById('workout-type').value,
                date: new Date().toISOString(),
                athletes: athletes
            };
            downloadBlob(JSON.stringify(data, null, 2), `track_workout_${new Date().toISOString().slice(0,10)}.json`, 'application/json');
        }

        function downloadBlob(content, filename, contentType) {
            const blob = new Blob([content], { type: contentType });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        }

        // Initial Render
        renderAthletes();
    </script>
</body>
</html>
