<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XC Multi-Timer & Universal VDOT Dashboard</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const DEFAULT_ATHLETES = [
      { id: '1', name: 'Alex M.', pbTime: '17:30', pbDistance: 5000, pbLabel: '5k', vdot: 57.8, selected: true, splits: [], restTimes: [], status: 'idle', startTime: 0, currentSplit: 0, currentRest: 0 },
      { id: '2', name: 'Jordan T.', pbTime: '10:30', pbDistance: 3000, pbLabel: '3k', vdot: 53.6, selected: true, splits: [], restTimes: [], status: 'idle', startTime: 0, currentSplit: 0, currentRest: 0 },
      { id: '3', name: 'Sam K.', pbTime: '02:55', pbDistance: 1000, pbLabel: '1k', vdot: 62.4, selected: true, splits: [], restTimes: [], status: 'idle', startTime: 0, currentSplit: 0, currentRest: 0 }
    ];

    function parseTimeToSeconds(timeStr) {
      if (!timeStr) return 0;
      const parts = timeStr.trim().split(':');
      if (parts.length === 2) return parseInt(parts[0], 10) * 60 + parseFloat(parts[1]);
      return parseFloat(timeStr) || 0;
    }

    function formatTime(seconds) {
      if (!seconds || isNaN(seconds) || seconds <= 0) return "00:00.0";
      const mins = Math.floor(seconds / 60);
      const secs = (seconds % 60).toFixed(1);
      return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
    }

    function parseDistanceToMeters(distInput) {
      if (!distInput) return 5000;
      const str = distInput.toString().trim().toLowerCase();
      if (str.includes('10k')) return 10000;
      if (str.includes('5k')) return 5000;
      if (str.includes('3k')) return 3000;
      if (str.includes('1.5k')) return 1500;
      if (str.includes('1k')) return 1000;
      const val = parseFloat(str);
      return isNaN(val) ? 5000 : val;
    }

    function calculateVDOT(raceSeconds, distanceMeters) {
      if (!raceSeconds || raceSeconds <= 0 || !distanceMeters || distanceMeters <= 0) return 0;
      const t = raceSeconds / 60;
      const v = distanceMeters / t;
      const vo2 = -4.60 + 0.182258 * v + 0.000104 * Math.pow(v, 2);
      const percentMax = 0.8 + 0.1894393 * Math.exp(-0.012778 * t) + 0.2989558 * Math.exp(-0.1932605 * t);
      return parseFloat((vo2 / percentMax).toFixed(1));
    }

    const ZONE_INTENSITY = {
      EASY: 0.70,
      TEMPO: 0.88,
      INTERVAL: 0.98,
      REP: 1.08
    };

    function calculateZoneTargetSplit(vdot, distanceMeters, zoneKey) {
      if (!vdot || vdot <= 0) return 0;
      const intensity = ZONE_INTENSITY[zoneKey] || 0.98;
      const targetVO2 = vdot * intensity;
      const a = 0.000104, b = 0.182258, c = -(4.60 + targetVO2);
      const v = (-b + Math.sqrt(b * b - 4 * a * c)) / (2 * a);
      const pacePerMeter = 1 / v;
      return (pacePerMeter * distanceMeters * 60);
    }

    function App() {
      const [workoutType, setWorkoutType] = useState('INTERVAL');
      const [distance, setDistance] = useState(800);
      const [totalReps, setTotalReps] = useState(5);
      const [targetRest, setTargetRest] = useState(120);

      const fileInputRef = useRef(null);

      const [athletes, setAthletes] = useState(() => {
        try {
          const saved = localStorage.getItem('xc_vdot_roster');
          if (saved) {
            const parsed = JSON.parse(saved);
            return parsed.map(ath => ({
              ...ath,
              splits: [],
              restTimes: [],
              status: 'idle',
              startTime: 0,
              currentSplit: 0,
              currentRest: 0,
              showRaceInput: false
            }));
          }
        } catch (e) {
          console.error('Failed to load saved roster', e);
        }
        return DEFAULT_ATHLETES;
      });

      const [newAthleteName, setNewAthleteName] = useState('');
      const [newAthleteTime, setNewAthleteTime] = useState('');
      const [newAthletePbDist, setNewAthletePbDist] = useState(5000);
      const [customVdot, setCustomVdot] = useState('');
      const [isTimerRunning, setIsTimerRunning] = useState(false);

      useEffect(() => {
        try {
          const rosterToSave = athletes.map(({ id, name, pbTime, pbDistance, pbLabel, vdot, selected }) => ({
            id, name, pbTime, pbDistance, pbLabel, vdot, selected
          }));
          localStorage.setItem('xc_vdot_roster', JSON.stringify(rosterToSave));
        } catch (e) {
          console.error('Failed to save roster', e);
        }
      }, [athletes]);

      const handleWorkoutTypeChange = (mode) => {
        setWorkoutType(mode);
        if (mode === 'EASY') { setDistance(5000); setTotalReps(1); setTargetRest(0); }
        else if (mode === 'TEMPO') { setDistance(1600); setTotalReps(3); setTargetRest(60); }
        else if (mode === 'INTERVAL') { setDistance(800); setTotalReps(5); setTargetRest(120); }
        else if (mode === 'REP') { setDistance(400); setTotalReps(8); setTargetRest(180); }
      };

      useEffect(() => {
        let animationFrameId;
        const updateTimers = () => {
          const now = Date.now();
          setAthletes(prevAthletes =>
            prevAthletes.map(ath => {
              if (!ath.selected) return ath;
              if (ath.status === 'running') {
                return { ...ath, currentSplit: (now - ath.startTime) / 1000 };
              } else if (ath.status === 'resting') {
                return { ...ath, currentRest: (now - ath.restStartTime) / 1000 };
              }
              return ath;
            })
          );
          if (isTimerRunning) animationFrameId = requestAnimationFrame(updateTimers);
        };

        if (isTimerRunning) animationFrameId = requestAnimationFrame(updateTimers);
        return () => cancelAnimationFrame(animationFrameId);
      }, [isTimerRunning]);

      const toggleAthleteSelection = (id) => {
        setAthletes(prev => prev.map(ath => ath.id === id ? { ...ath, selected: !ath.selected } : ath));
      };

      const handleAddAthlete = (e) => {
        e.preventDefault();
        if (!newAthleteName.trim()) return;

        let computedVdot = 50;
        if (customVdot && !isNaN(parseFloat(customVdot))) {
          computedVdot = parseFloat(customVdot);
        } else if (newAthleteTime.trim()) {
          const secs = parseTimeToSeconds(newAthleteTime);
          if (secs > 0) computedVdot = calculateVDOT(secs, newAthletePbDist);
        }

        const distanceLabels = { 1000: '1k', 1500: '1.5k', 3000: '3k', 5000: '5k', 10000: '10k' };

        const newEntry = {
          id: Date.now().toString(),
          name: newAthleteName.trim(),
          pbTime: newAthleteTime.trim() || 'N/A',
          pbDistance: newAthletePbDist,
          pbLabel: distanceLabels[newAthletePbDist] || `${newAthletePbDist}m`,
          vdot: computedVdot,
          selected: true,
          splits: [],
          restTimes: [],
          status: 'idle',
          startTime: 0,
          currentSplit: 0,
          currentRest: 0,
          showRaceInput: false
        };

        setAthletes(prev => [...prev, newEntry]);
        setNewAthleteName('');
        setNewAthleteTime('');
        setCustomVdot('');
      };

      const handleCSVImport = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
          const text = event.target.result;
          const lines = text.split('\n');
          const newImported = [];
          const distanceLabels = { 1000: '1k', 1500: '1.5k', 3000: '3k', 5000: '5k', 10000: '10k' };

          lines.forEach((line, idx) => {
            if (!line.trim()) return;
            const parts = line.split(',').map(p => p.trim().replace(/^["']|["']$/g, ''));
            if (idx === 0 && (parts[0].toLowerCase().includes('name') || parts[0].toLowerCase().includes('athlete'))) return;

            if (parts.length >= 2) {
              const name = parts[0];
              const pbTime = parts[1];
              const pbDistMeters = parts[2] ? parseDistanceToMeters(parts[2]) : 5000;
              const secs = parseTimeToSeconds(pbTime);
              const computedVdot = secs > 0 ? calculateVDOT(secs, pbDistMeters) : 50;

              if (name) {
                newImported.push({
                  id: (Date.now() + idx).toString(),
                  name: name,
                  pbTime: pbTime || 'N/A',
                  pbDistance: pbDistMeters,
                  pbLabel: distanceLabels[pbDistMeters] || `${pbDistMeters}m`,
                  vdot: computedVdot,
                  selected: true,
                  splits: [],
                  restTimes: [],
                  status: 'idle',
                  startTime: 0,
                  currentSplit: 0,
                  currentRest: 0,
                  showRaceInput: false
                });
              }
            }
          });

          if (newImported.length > 0) {
            setAthletes(prev => [...prev, ...newImported]);
            alert(`Successfully imported ${newImported.length} athletes!`);
          } else {
            alert('No valid athlete records found in CSV.');
          }
          e.target.value = '';
        };
        reader.readAsText(file);
      };

      const handleDownloadSampleCSV = () => {
        const sampleContent = "data:text/csv;charset=utf-8,Name,PB Time,PB Distance\nAlex Smith,17:30,5000\nJordan Taylor,10:30,3k\nSam K.,02:55,1000\n";
        const link = document.createElement("a");
        link.setAttribute("href", encodeURI(sampleContent));
        link.setAttribute("download", "roster_import_template.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      const handleDeleteAthlete = (id) => {
        setAthletes(prev => prev.filter(ath => ath.id !== id));
      };

      const handleUpgradeVDOT = (id, delta = 1.0) => {
        setAthletes(prev => prev.map(ath => ath.id === id ? { ...ath, vdot: parseFloat((ath.vdot + delta).toFixed(1)) } : ath));
      };

      const handleUpdateRaceTime = (id, timeStr, distMeters) => {
        const secs = parseTimeToSeconds(timeStr);
        if (secs <= 0) return;
        const newVdot = calculateVDOT(secs, distMeters);
        const distanceLabels = { 1000: '1k', 1500: '1.5k', 3000: '3k', 5000: '5k', 10000: '10k' };

        setAthletes(prev => prev.map(ath => {
          if (ath.id === id) {
            return {
              ...ath,
              pbTime: timeStr,
              pbDistance: distMeters,
              pbLabel: distanceLabels[distMeters] || `${distMeters}m`,
              vdot: newVdot,
              showRaceInput: false
            };
          }
          return ath;
        }));
      };

      const toggleRaceInput = (id) => {
        setAthletes(prev => prev.map(ath => ath.id === id ? { ...ath, showRaceInput: !ath.showRaceInput } : ath));
      };

      const handleResetToDefaultRoster = () => {
        if (window.confirm("Reset roster to default demo runners?")) {
          setAthletes(DEFAULT_ATHLETES);
        }
      };

      const handleClearRoster = () => {
        if (window.confirm("Clear all athletes from your saved roster?")) {
          setAthletes([]);
        }
      };

      const handleStartAll = () => {
        const now = Date.now();
        setIsTimerRunning(true);
        setAthletes(prev => prev.map(ath => ath.selected ? { ...ath, status: 'running', startTime: now, currentSplit: 0 } : ath));
      };

      const handleStopIndividual = (id) => {
        const now = Date.now();
        setAthletes(prev => prev.map(ath => {
          if (ath.id === id && ath.status === 'running') {
            return { ...ath, status: 'resting', splits: [...ath.splits, ath.currentSplit], restStartTime: now, currentRest: 0 };
          }
          return ath;
        }));
      };

      const handleStartNextRep = (id) => {
        const now = Date.now();
        setAthletes(prev => prev.map(ath => {
          if (ath.id === id && ath.status === 'resting') {
            return { ...ath, status: 'running', restTimes: [...ath.restTimes, ath.currentRest], startTime: now, currentSplit: 0 };
          }
          return ath;
        }));
      };

      const handleResetAll = () => {
        setIsTimerRunning(false);
        setAthletes(prev => prev.map(ath => ({ ...ath, status: 'idle', splits: [], restTimes: [], currentSplit: 0, currentRest: 0 })));
      };

      const handleExportCSV = () => {
        let csvContent = `data:text/csv;charset=utf-8,Workout Mode: ${workoutType},Distance: ${distance}m\nAthlete,PB Effort,VDOT`;
        for (let i = 1; i <= totalReps; i++) csvContent += `,Rep ${i} Split,Rep ${i} Rest`;
        csvContent += "\n";

        athletes.filter(a => a.selected).forEach(ath => {
          let row = `"${ath.name}","${ath.pbLabel}: ${ath.pbTime}",${ath.vdot}`;
          for (let i = 0; i < totalReps; i++) row += `,${formatTime(ath.splits[i] || 0)},${formatTime(ath.restTimes[i] || 0)}`;
          csvContent += row + "\n";
        });

        const link = document.createElement("a");
        link.setAttribute("href", encodeURI(csvContent));
        link.setAttribute("download", `XC_${workoutType}_${distance}m_${new Date().toISOString().slice(0,10)}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      const activeAthletes = athletes.filter(a => a.selected);

      // --- INSIGHTS COMPUTATION LOGIC ---
      const activeWithSplits = activeAthletes.filter(a => a.splits.length > 0);
      let totalCompletedReps = 0;
      let totalPaceDeltaSum = 0;
      let standoutRunners = [];
      let fadedRunners = [];

      activeWithSplits.forEach(ath => {
        const target = calculateZoneTargetSplit(ath.vdot, distance, workoutType);
        totalCompletedReps += ath.splits.length;

        const avgSplit = ath.splits.reduce((a, b) => a + b, 0) / ath.splits.length;
        const diff = avgSplit - target; // negative means faster than target
        totalPaceDeltaSum += diff * ath.splits.length;

        if (diff < -1.5 && ath.splits.length >= 2) {
          standoutRunners.push(`${ath.name} (-${Math.abs(diff).toFixed(1)}s/rep avg)`);
        }

        if (ath.splits.length >= 3) {
          const firstRep = ath.splits[0];
          const lastRep = ath.splits[ath.splits.length - 1];
          if (lastRep - firstRep > 3.0) {
            fadedRunners.push(`${ath.name} (+${(lastRep - firstRep).toFixed(1)}s fade)`);
          }
        }
      });

      const overallAvgDelta = totalCompletedReps > 0 ? (totalPaceDeltaSum / totalCompletedReps) : 0;

      return (
        <div class="w-full px-8 py-6">
          {/* Header */}
          <div class="flex items-center justify-between border-b border-slate-800 pb-5 mb-6">
            <div>
              <h1 class="text-3xl font-black text-indigo-400 tracking-tight">XC Multi-Timer & VDOT Dashboard</h1>
              <p class="text-slate-400 text-sm mt-1">Desktop Coaching Suite — Auto-Refinement & Dynamic Insights</p>
            </div>
            <div class="flex items-center gap-3">
              <button onClick={handleStartAll} class="bg-emerald-600 hover:bg-emerald-500 text-white px-6 py-3 rounded-lg font-bold text-base shadow-md transition-colors">
                ▶ START ALL ACTIVE ({activeAthletes.length})
              </button>
              <button onClick={handleResetAll} class="bg-slate-800 hover:bg-slate-700 text-slate-200 px-5 py-3 rounded-lg font-semibold transition-colors border border-slate-700">Reset Timers</button>
              <button onClick={handleExportCSV} class="bg-indigo-600 hover:bg-indigo-500 text-white px-5 py-3 rounded-lg font-semibold transition-colors">Export CSV</button>
            </div>
          </div>

          <div class="grid grid-cols-12 gap-6">
            
            {/* Left Sidebar Controls */}
            <div class="col-span-4 space-y-6">
              
              {/* Add New Athlete Panel */}
              <div class="bg-slate-900 p-5 rounded-xl border border-indigo-500/30">
                <h2 class="text-sm font-bold uppercase tracking-wider text-indigo-400 mb-3">Add Athlete to Roster</h2>
                <form onSubmit={handleAddAthlete} class="space-y-3">
                  <div>
                    <label class="block text-xs text-slate-400 font-semibold mb-1">Athlete Name</label>
                    <input
                      type="text"
                      placeholder="e.g. Jordan Smith"
                      value={newAthleteName}
                      onChange={e => setNewAthleteName(e.target.value)}
                      class="w-full bg-slate-950 border border-slate-800 rounded-md px-3 py-2 text-white text-sm outline-none focus:border-indigo-500"
                      required
                    />
                  </div>

                  <div class="grid grid-cols-2 gap-2">
                    <div>
                      <label class="block text-xs text-slate-400 font-semibold mb-1">PB Distance</label>
                      <select
                        value={newAthletePbDist}
                        onChange={e => setNewAthletePbDist(Number(e.target.value))}
                        class="w-full bg-slate-950 border border-slate-800 rounded-md px-2 py-2 text-white text-sm outline-none focus:border-indigo-500 font-semibold"
                      >
                        <option value={1000}>1,000m (1k)</option>
                        <option value={1500}>1,500m (1.5k)</option>
                        <option value={3000}>3,000m (3k)</option>
                        <option value={5000}>5,000m (5k)</option>
                        <option value={10000}>10,000m (10k)</option>
                      </select>
                    </div>
                    <div>
                      <label class="block text-xs text-slate-400 font-semibold mb-1">PB Time (mm:ss)</label>
                      <input
                        type="text"
                        placeholder="09:45"
                        value={newAthleteTime}
                        onChange={e => setNewAthleteTime(e.target.value)}
                        class="w-full bg-slate-950 border border-slate-800 rounded-md px-3 py-2 text-white text-sm outline-none focus:border-indigo-500"
                      />
                    </div>
                  </div>

                  <div>
                    <label class="block text-xs text-slate-400 font-semibold mb-1">Manual VDOT (Override)</label>
                    <input
                      type="number"
                      step="0.1"
                      placeholder="Optional"
                      value={customVdot}
                      onChange={e => setCustomVdot(e.target.value)}
                      class="w-full bg-slate-950 border border-slate-800 rounded-md px-3 py-2 text-white text-sm outline-none focus:border-indigo-500"
                    />
                  </div>

                  <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-2.5 rounded-md text-sm transition-colors shadow-md">
                    + Add Athlete Now
                  </button>
                </form>
              </div>

              {/* Workout Setup */}
              <div class="bg-slate-900 p-5 rounded-xl border border-slate-800">
                <h2 class="text-sm font-bold uppercase tracking-wider text-indigo-400 mb-4">Workout Mode</h2>
                <div class="grid grid-cols-2 gap-2 mb-4">
                  {[
                    { key: 'EASY', label: 'Easy / Recovery' },
                    { key: 'TEMPO', label: 'Tempo' },
                    { key: 'INTERVAL', label: 'Interval (VO2)' },
                    { key: 'REP', label: 'Speed Reps' }
                  ].map(mode => (
                    <button
                      key={mode.key}
                      onClick={() => handleWorkoutTypeChange(mode.key)}
                      class={`p-2.5 text-center rounded-lg border text-xs font-bold transition-all ${workoutType === mode.key ? 'bg-indigo-600 border-indigo-400 text-white' : 'bg-slate-950 border-slate-800 text-slate-400 hover:border-slate-700 hover:text-slate-200'}`}
                    >
                      {mode.label}
                    </button>
                  ))}
                </div>

                <div class="grid grid-cols-3 gap-3 pt-3 border-t border-slate-800">
                  <div>
                    <label class="block text-xs font-bold text-slate-400 mb-1">Distance (m)</label>
                    <input type="number" value={distance} onChange={e => setDistance(Number(e.target.value))} class="w-full bg-slate-950 border border-slate-800 rounded-md px-2.5 py-1.5 text-white font-mono text-sm outline-none focus:border-indigo-500" />
                  </div>
                  <div>
                    <label class="block text-xs font-bold text-slate-400 mb-1">Reps</label>
                    <input type="number" value={totalReps} onChange={e => setTotalReps(Number(e.target.value))} class="w-full bg-slate-950 border border-slate-800 rounded-md px-2.5 py-1.5 text-white font-mono text-sm outline-none focus:border-indigo-500" />
                  </div>
                  <div>
                    <label class="block text-xs font-bold text-slate-400 mb-1">Rest (s)</label>
                    <input type="number" value={targetRest} onChange={e => setTargetRest(Number(e.target.value))} class="w-full bg-slate-950 border border-slate-800 rounded-md px-2.5 py-1.5 text-white font-mono text-sm outline-none focus:border-indigo-500" />
                  </div>
                </div>
              </div>

              {/* Roster Management */}
              <div class="bg-slate-900 p-5 rounded-xl border border-slate-800">
                <div class="flex justify-between items-center mb-3">
                  <h2 class="text-sm font-bold uppercase tracking-wider text-indigo-400">Manage Roster</h2>
                  <span class="text-xs text-slate-400 font-mono">{activeAthletes.length} Active</span>
                </div>
                
                <div class="space-y-2 max-h-52 overflow-y-auto pr-1 mb-3">
                  {athletes.length === 0 ? (
                    <p class="text-xs text-slate-500 italic text-center py-4">No athletes added yet.</p>
                  ) : (
                    athletes.map(ath => (
                      <div key={ath.id} class={`flex items-center justify-between p-2 rounded-lg border text-sm transition-all ${ath.selected ? 'bg-indigo-950/40 border-indigo-500/50 text-indigo-100 font-semibold' : 'bg-slate-950 border-slate-800 text-slate-500'}`}>
                        <label class="flex items-center gap-2.5 cursor-pointer flex-1">
                          <input type="checkbox" checked={ath.selected} onChange={() => toggleAthleteSelection(ath.id)} class="rounded border-slate-700 text-indigo-600 h-4 w-4" />
                          <span>{ath.name}</span>
                        </label>
                        <div class="flex items-center gap-3">
                          <span class="text-xs font-mono text-slate-400">({ath.pbLabel}: {ath.pbTime}) VDOT {ath.vdot}</span>
                          <button onClick={() => handleDeleteAthlete(ath.id)} class="text-slate-600 hover:text-rose-400 text-xs px-1" title="Remove Athlete">✕</button>
                        </div>
                      </div>
                    ))
                  )}
                </div>

                {/* CSV Import / Export Section */}
                <div class="space-y-2 pt-2 border-t border-slate-800">
                  <input
                    type="file"
                    accept=".csv"
                    ref={fileInputRef}
                    onChange={handleCSVImport}
                    class="hidden"
                  />
                  <button
                    onClick={() => fileInputRef.current && fileInputRef.current.click()}
                    class="w-full bg-indigo-900/50 hover:bg-indigo-800/60 text-indigo-200 border border-indigo-500/40 font-semibold text-xs py-2 rounded transition-colors flex items-center justify-center gap-1.5"
                  >
                    📂 Import CSV Roster
                  </button>

                  <div class="flex gap-2">
                    <button onClick={handleDownloadSampleCSV} class="flex-1 bg-slate-950 hover:bg-slate-800 text-slate-400 text-[11px] py-1 rounded border border-slate-800 transition-colors">CSV Template</button>
                    <button onClick={handleResetToDefaultRoster} class="flex-1 bg-slate-950 hover:bg-slate-800 text-slate-400 text-[11px] py-1 rounded border border-slate-800 transition-colors">Defaults</button>
                    <button onClick={handleClearRoster} class="flex-1 bg-slate-950 hover:bg-slate-800 text-rose-400/80 text-[11px] py-1 rounded border border-slate-800 transition-colors">Clear All</button>
                  </div>
                </div>

              </div>

            </div>

            {/* Right Main Grid */}
            <div class="col-span-8 space-y-6">
              {activeAthletes.length === 0 ? (
                <div class="bg-slate-900 border border-slate-800 rounded-xl p-12 text-center text-slate-500">
                  <p class="text-lg font-semibold mb-2 text-slate-400">No active athletes selected</p>
                  <p class="text-sm">Use the panel on the left to add athletes, import a CSV, or check off runners from your roster to start timing.</p>
                </div>
              ) : (
                <div class="grid grid-cols-2 gap-4">
                  {activeAthletes.map(ath => {
                    const targetSplitSecs = calculateZoneTargetSplit(ath.vdot, distance, workoutType);
                    const currentRepNumber = ath.splits.length + 1;

                    // Performance Flag logic: If avg split is at least 1.5s faster than target over >=2 reps
                    const hasSplits = ath.splits.length >= 2;
                    const avgSplit = hasSplits ? ath.splits.reduce((a, b) => a + b, 0) / ath.splits.length : 0;
                    const splitDiff = hasSplits ? (avgSplit - targetSplitSecs) : 0;
                    const outperformsTarget = hasSplits && splitDiff <= -1.5;

                    return (
                      <div key={ath.id} class={`p-5 rounded-xl border transition-all relative ${ath.status === 'running' ? 'bg-slate-900 border-emerald-500 ring-1 ring-emerald-500' : ath.status === 'resting' ? 'bg-slate-900 border-amber-500' : 'bg-slate-900 border-slate-800'}`}>
                        
                        <div class="flex justify-between items-start mb-2">
                          <div>
                            <h3 class="font-bold text-xl text-slate-100">{ath.name}</h3>
                            <div class="text-xs text-slate-400 mt-0.5 flex items-center gap-2">
                              <span>VDOT: <strong class="text-indigo-400">{ath.vdot}</strong></span>
                              <span>| {ath.pbLabel} PB: {ath.pbTime}</span>
                            </div>
                          </div>
                          
                          <div class="flex flex-col items-end gap-1">
                            <span class="text-xs font-bold px-3 py-1 rounded-full bg-slate-950 border border-slate-800 text-slate-300">
                              Rep {Math.min(currentRepNumber, totalReps)} / {totalReps}
                            </span>
                            <button
                              onClick={() => toggleRaceInput(ath.id)}
                              class="text-[11px] text-indigo-400 hover:text-indigo-300 underline font-semibold"
                            >
                              {ath.showRaceInput ? 'Cancel' : '+ Log Race Time'}
                            </button>
                          </div>
                        </div>

                        {/* Race Result Quick-Update Form */}
                        {ath.showRaceInput && (
                          <div class="bg-indigo-950/60 p-3 rounded-lg border border-indigo-500/40 my-2 space-y-2 text-xs">
                            <div class="font-bold text-indigo-200">Log Official Race Effort:</div>
                            <div class="flex gap-2">
                              <select id={`race-dist-${ath.id}`} defaultValue={ath.pbDistance} class="bg-slate-950 border border-slate-800 text-white rounded px-2 py-1">
                                <option value={1000}>1k</option>
                                <option value={1500}>1.5k</option>
                                <option value={3000}>3k</option>
                                <option value={5000}>5k</option>
                                <option value={10000}>10k</option>
                              </select>
                              <input id={`race-time-${ath.id}`} type="text" placeholder="e.g. 17:15" class="bg-slate-950 border border-slate-800 text-white rounded px-2 py-1 flex-1 font-mono" />
                              <button
                                onClick={() => {
                                  const timeVal = document.getElementById(`race-time-${ath.id}`).value;
                                  const distVal = Number(document.getElementById(`race-dist-${ath.id}`).value);
                                  handleUpdateRaceTime(ath.id, timeVal, distVal);
                                }}
                                class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold px-3 py-1 rounded"
                              >
                                Save
                              </button>
                            </div>
                          </div>
                        )}

                        {/* Coach Upgrade Flag Banner */}
                        {outperformsTarget && (
                          <div class="bg-emerald-950/80 border border-emerald-500/60 p-2.5 rounded-lg mb-3 text-xs flex items-center justify-between">
                            <span class="text-emerald-200 font-medium">💡 Outpacing target by ~{Math.abs(splitDiff).toFixed(1)}s/rep!</span>
                            <button
                              onClick={() => handleUpgradeVDOT(ath.id, 1.0)}
                              class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold px-2.5 py-1 rounded shadow text-[11px]"
                            >
                              Upgrade VDOT +1.0
                            </button>
                          </div>
                        )}

                        <div class="bg-slate-950 p-4 rounded-lg border border-slate-800 mb-4">
                          <div class="flex justify-between items-center text-xs text-slate-400 pb-2 border-b border-slate-800/80">
                            <span>Target Pace ({workoutType}):</span>
                            <span class="font-mono text-indigo-300 font-bold text-sm">{formatTime(targetSplitSecs)}</span>
                          </div>

                          <div class="flex justify-between items-end mt-3">
                            <div>
                              <div class="text-xs text-slate-500 font-bold uppercase">Rep Time</div>
                              <div class={`text-4xl font-mono font-black ${ath.status === 'running' ? 'text-emerald-400' : 'text-slate-100'}`}>
                                {ath.status === 'running' ? formatTime(ath.currentSplit) : formatTime(ath.splits[ath.splits.length - 1] || 0)}
                              </div>
                            </div>

                            {ath.status === 'resting' && (
                              <div class="text-right">
                                <div class="text-xs text-amber-400 font-bold uppercase">Resting</div>
                                <div class="text-2xl font-mono font-bold text-amber-300">{formatTime(ath.currentRest)}</div>
                              </div>
                            )}
                          </div>
                        </div>

                        <div class="mb-3">
                          {ath.status === 'running' && <button onClick={() => handleStopIndividual(ath.id)} class="w-full bg-rose-600 hover:bg-rose-500 text-white font-bold py-3 rounded-lg text-lg transition-colors">STOP REP {currentRepNumber}</button>}
                          {ath.status === 'resting' && <button onClick={() => handleStartNextRep(ath.id)} class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-2.5 rounded-lg transition-colors">START REP {currentRepNumber}</button>}
                          {ath.status === 'idle' && <button onClick={() => handleStopIndividual(ath.id)} disabled class="w-full bg-slate-800 text-slate-600 font-semibold py-2.5 rounded-lg cursor-not-allowed">Ready</button>}
                        </div>

                        {ath.splits.length > 0 && (
                          <div class="pt-3 border-t border-slate-800">
                            <div class="text-xs font-bold text-slate-500 uppercase mb-2">Completed Splits</div>
                            <div class="flex flex-wrap gap-2">
                              {ath.splits.map((s, i) => (
                                <div key={i} class="text-xs font-mono px-2.5 py-1 rounded bg-slate-950 border border-slate-800 text-indigo-300">
                                  R{i+1}: <span class="font-bold text-slate-200">{formatTime(s)}</span>
                                </div>
                              ))}
                            </div>
                          </div>
                        )}

                      </div>
                    );
                  })}
                </div>
              )}

              {/* GENERATED WORKOUT INSIGHTS PANEL */}
              <div class="bg-slate-900 border border-indigo-500/40 rounded-xl p-5 shadow-xl">
                <div class="flex justify-between items-center mb-3">
                  <div class="flex items-center gap-2">
                    <span class="text-lg">📊</span>
                    <h2 class="text-base font-bold text-slate-100 uppercase tracking-wider">Live Workout Insights & Analytics</h2>
                  </div>
                  <span class="text-xs text-indigo-400 font-mono font-semibold bg-indigo-950/80 px-2.5 py-1 rounded border border-indigo-800">
                    {totalCompletedReps} Total Reps Logged
                  </span>
                </div>

                {totalCompletedReps === 0 ? (
                  <p class="text-xs text-slate-500 italic py-2">
                    Insights will populate automatically as runners complete their reps during the session.
                  </p>
                ) : (
                  <div class="grid grid-cols-3 gap-4 pt-2">
                    
                    {/* Metric 1: Group Execution Score */}
                    <div class="bg-slate-950 p-3.5 rounded-lg border border-slate-800">
                      <div class="text-xs text-slate-400 font-semibold mb-1">Group Target Execution</div>
                      <div class={`text-xl font-mono font-bold ${overallAvgDelta <= 0 ? 'text-emerald-400' : 'text-amber-400'}`}>
                        {overallAvgDelta <= 0 ? `${Math.abs(overallAvgDelta).toFixed(1)}s FASTER` : `${overallAvgDelta.toFixed(1)}s SLOWER`}
                      </div>
                      <div class="text-[11px] text-slate-500 mt-1">Average deviation from VDOT target pace across all active reps.</div>
                    </div>

                    {/* Metric 2: Standout / Upgrade Candidates */}
                    <div class="bg-slate-950 p-3.5 rounded-lg border border-slate-800">
                      <div class="text-xs text-slate-400 font-semibold mb-1">Outperforming Target</div>
                      {standoutRunners.length === 0 ? (
                        <div class="text-xs text-slate-500 py-1">None flagged yet</div>
                      ) : (
                        <div class="space-y-1">
                          {standoutRunners.map((str, i) => (
                            <div key={i} class="text-xs font-mono text-emerald-300 font-semibold">• {str}</div>
                          ))}
                        </div>
                      )}
                    </div>

                    {/* Metric 3: Fade / Fatigue Watch */}
                    <div class="bg-slate-950 p-3.5 rounded-lg border border-slate-800">
                      <div class="text-xs text-slate-400 font-semibold mb-1">Pacing Fade (>3s drop-off)</div>
                      {fadedRunners.length === 0 ? (
                        <div class="text-xs text-emerald-400/80 font-semibold py-1">✓ Excellent group consistency</div>
                      ) : (
                        <div class="space-y-1">
                          {fadedRunners.map((str, i) => (
                            <div key={i} class="text-xs font-mono text-amber-300 font-semibold">• {str}</div>
                          ))}
                        </div>
                      )}
                    </div>

                  </div>
                )}
              </div>

            </div>

          </div>
        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
