<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XC Multi-Timer & VDOT Dashboard</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function parseTimeToSeconds(timeStr) {
      if (!timeStr) return 0;
      const parts = timeStr.trim().split(':');
      if (parts.length === 2) return parseInt(parts[0], 10) * 60 + parseFloat(parts[1]);
      return parseFloat(timeStr) || 0;
    }

    function formatTime(seconds) {
      if (!seconds || isNaN(seconds) || seconds <= 0) return "00:00.0";
      const mins = Math.floor(seconds / 60);
      const secs = (seconds % 60).toFixed(1);
      return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
    }

    function calculateVDOT(fiveKSeconds) {
      if (!fiveKSeconds || fiveKSeconds <= 0) return 0;
      const t = fiveKSeconds / 60;
      const v = 5000 / t;
      const vo2 = -4.60 + 0.182258 * v + 0.000104 * Math.pow(v, 2);
      const percentMax = 0.8 + 0.1894393 * Math.exp(-0.012778 * t) + 0.2989558 * Math.exp(-0.1932605 * t);
      return (vo2 / percentMax).toFixed(1);
    }

    const ZONE_INTENSITY = {
      EASY: 0.70,
      TEMPO: 0.88,
      INTERVAL: 0.98,
      REP: 1.08
    };

    function calculateZoneTargetSplit(vdot, distanceMeters, zoneKey) {
      if (!vdot || vdot <= 0) return 0;
      const intensity = ZONE_INTENSITY[zoneKey] || 0.98;
      const targetVO2 = vdot * intensity;
      const a = 0.000104, b = 0.182258, c = -(4.60 + targetVO2);
      const v = (-b + Math.sqrt(b * b - 4 * a * c)) / (2 * a);
      const pacePerMeter = 1 / v;
      return (pacePerMeter * distanceMeters * 60);
    }

    function App() {
      const [workoutType, setWorkoutType] = useState('INTERVAL');
      const [distance, setDistance] = useState(800);
      const [totalReps, setTotalReps] = useState(5);
      const [targetRest, setTargetRest] = useState(120);

      const [athletes, setAthletes] = useState([
        { id: '1', name: 'Alex M.', fiveKPR: '17:30', vdot: 57.8, selected: true, splits: [], restTimes: [], status: 'idle', startTime: 0, currentSplit: 0, currentRest: 0 },
        { id: '2', name: 'Jordan T.', fiveKPR: '18:45', vdot: 53.2, selected: true, splits: [], restTimes: [], status: 'idle', startTime: 0, currentSplit: 0, currentRest: 0 },
        { id: '3', name: 'Sam K.', fiveKPR: '16:15', vdot: 63.1, selected: true, splits: [], restTimes: [], status: 'idle', startTime: 0, currentSplit: 0, currentRest: 0 }
      ]);

      const [newAthleteName, setNewAthleteName] = useState('');
      const [newAthlete5k, setNewAthlete5k] = useState('');
      const [customVdot, setCustomVdot] = useState('');
      const [isTimerRunning, setIsTimerRunning] = useState(false);

      const handleWorkoutTypeChange = (mode) => {
        setWorkoutType(mode);
        if (mode === 'EASY') { setDistance(5000); setTotalReps(1); setTargetRest(0); }
        else if (mode === 'TEMPO') { setDistance(1600); setTotalReps(3); setTargetRest(60); }
        else if (mode === 'INTERVAL') { setDistance(800); setTotalReps(5); setTargetRest(120); }
        else if (mode === 'REP') { setDistance(400); setTotalReps(8); setTargetRest(180); }
      };

      useEffect(() => {
        let animationFrameId;
        const updateTimers = () => {
          const now = Date.now();
          setAthletes(prevAthletes =>
            prevAthletes.map(ath => {
              if (!ath.selected) return ath;
              if (ath.status === 'running') {
                return { ...ath, currentSplit: (now - ath.startTime) / 1000 };
              } else if (ath.status === 'resting') {
                return { ...ath, currentRest: (now - ath.restStartTime) / 1000 };
              }
              return ath;
            })
          );
          if (isTimerRunning) animationFrameId = requestAnimationFrame(updateTimers);
        };

        if (isTimerRunning) animationFrameId = requestAnimationFrame(updateTimers);
        return () => cancelAnimationFrame(animationFrameId);
      }, [isTimerRunning]);

      const toggleAthleteSelection = (id) => {
        setAthletes(prev => prev.map(ath => ath.id === id ? { ...ath, selected: !ath.selected } : ath));
      };

      const handleStartAll = () => {
        const now = Date.now();
        setIsTimerRunning(true);
        setAthletes(prev => prev.map(ath => ath.selected ? { ...ath, status: 'running', startTime: now, currentSplit: 0 } : ath));
      };

      const handleStopIndividual = (id) => {
        const now = Date.now();
        setAthletes(prev => prev.map(ath => {
          if (ath.id === id && ath.status === 'running') {
            return { ...ath, status: 'resting', splits: [...ath.splits, ath.currentSplit], restStartTime: now, currentRest: 0 };
          }
          return ath;
        }));
      };

      const handleStartNextRep = (id) => {
        const now = Date.now();
        setAthletes(prev => prev.map(ath => {
          if (ath.id === id && ath.status === 'resting') {
            return { ...ath, status: 'running', restTimes: [...ath.restTimes, ath.currentRest], startTime: now, currentSplit: 0 };
          }
          return ath;
        }));
      };

      const handleResetAll = () => {
        setIsTimerRunning(false);
        setAthletes(prev => prev.map(ath => ({ ...ath, status: 'idle', splits: [], restTimes: [], currentSplit: 0, currentRest: 0 })));
      };

      const handleAddAthlete = (e) => {
        e.preventDefault();
        if (!newAthleteName) return;
        let computedVdot = customVdot ? parseFloat(customVdot) : calculateVDOT(parseTimeToSeconds(newAthlete5k));
        setAthletes([...athletes, {
          id: Date.now().toString(),
          name: newAthleteName,
          fiveKPR: newAthlete5k || 'N/A',
          vdot: computedVdot > 0 ? computedVdot : 50,
          selected: true, splits: [], restTimes: [], status: 'idle', startTime: 0, currentSplit: 0, currentRest: 0
        }]);
        setNewAthleteName(''); setNewAthlete5k(''); setCustomVdot('');
      };

      const handleExportCSV = () => {
        let csvContent = `data:text/csv;charset=utf-8,Workout Mode: ${workoutType},Distance: ${distance}m\nAthlete,5K PR,VDOT`;
        for (let i = 1; i <= totalReps; i++) csvContent += `,Rep ${i} Split,Rep ${i} Rest`;
        csvContent += "\n";

        athletes.filter(a => a.selected).forEach(ath => {
          let row = `"${ath.name}","${ath.fiveKPR}",${ath.vdot}`;
          for (let i = 0; i < totalReps; i++) row += `,${formatTime(ath.splits[i] || 0)},${formatTime(ath.restTimes[i] || 0)}`;
          csvContent += row + "\n";
        });

        const link = document.createElement("a");
        link.setAttribute("href", encodeURI(csvContent));
        link.setAttribute("download", `XC_${workoutType}_${distance}m_${new Date().toISOString().slice(0,10)}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      const activeAthletes = athletes.filter(a => a.selected);

      return (
        <div class="w-full px-8 py-6">
          {/* Desktop Header Bar */}
          <div class="flex items-center justify-between border-b border-slate-800 pb-5 mb-6">
            <div>
              <h1 class="text-3xl font-black text-indigo-400 tracking-tight">XC Multi-Timer & VDOT Dashboard</h1>
              <p class="text-slate-400 text-sm mt-1">Desktop Coaching Suite — Jack Daniels VDOT Pacing & Group Interval Tracker</p>
            </div>
            <div class="flex items-center gap-3">
              <button onClick={handleStartAll} class="bg-emerald-600 hover:bg-emerald-500 text-white px-6 py-3 rounded-lg font-bold text-base shadow-md transition-colors">
                ▶ START ALL ACTIVE ({activeAthletes.length})
              </button>
              <button onClick={handleResetAll} class="bg-slate-800 hover:bg-slate-700 text-slate-200 px-5 py-3 rounded-lg font-semibold transition-colors border border-slate-700">Reset Timers</button>
              <button onClick={handleExportCSV} class="bg-indigo-600 hover:bg-indigo-500 text-white px-5 py-3 rounded-lg font-semibold transition-colors">Export CSV</button>
            </div>
          </div>

          {/* Desktop 2-Column Main Layout */}
          <div class="grid grid-cols-12 gap-6">
            
            {/* Left Control Sidebar (4 Columns) */}
            <div class="col-span-4 space-y-6">
              
              {/* Workout Selector */}
              <div class="bg-slate-900 p-5 rounded-xl border border-slate-800">
                <h2 class="text-sm font-bold uppercase tracking-wider text-indigo-400 mb-4">Workout Mode</h2>
                <div class="grid grid-cols-2 gap-2 mb-4">
                  {[
                    { key: 'EASY', label: 'Easy / Recovery' },
                    { key: 'TEMPO', label: 'Tempo' },
                    { key: 'INTERVAL', label: 'Interval (VO2)' },
                    { key: 'REP', label: 'Speed Reps' }
                  ].map(mode => (
                    <button
                      key={mode.key}
                      onClick={() => handleWorkoutTypeChange(mode.key)}
                      class={`p-3 text-center rounded-lg border text-sm font-bold transition-all ${workoutType === mode.key ? 'bg-indigo-600 border-indigo-400 text-white' : 'bg-slate-950 border-slate-800 text-slate-400 hover:border-slate-700 hover:text-slate-200'}`}
                    >
                      {mode.label}
                    </button>
                  ))}
                </div>

                <div class="grid grid-cols-3 gap-3 pt-3 border-t border-slate-800">
                  <div>
                    <label class="block text-xs font-bold text-slate-400 mb-1">Distance (m)</label>
                    <input type="number" value={distance} onChange={e => setDistance(Number(e.target.value))} class="w-full bg-slate-950 border border-slate-800 rounded-md px-3 py-1.5 text-white font-mono text-sm outline-none focus:border-indigo-500" />
                  </div>
                  <div>
                    <label class="block text-xs font-bold text-slate-400 mb-1">Target Reps</label>
                    <input type="number" value={totalReps} onChange={e => setTotalReps(Number(e.target.value))} class="w-full bg-slate-950 border border-slate-800 rounded-md px-3 py-1.5 text-white font-mono text-sm outline-none focus:border-indigo-500" />
                  </div>
                  <div>
                    <label class="block text-xs font-bold text-slate-400 mb-1">Rest (s)</label>
                    <input type="number" value={targetRest} onChange={e => setTargetRest(Number(e.target.value))} class="w-full bg-slate-950 border border-slate-800 rounded-md px-3 py-1.5 text-white font-mono text-sm outline-none focus:border-indigo-500" />
                  </div>
                </div>
              </div>

              {/* Roster Management */}
              <div class="bg-slate-900 p-5 rounded-xl border border-slate-800">
                <div class="flex justify-between items-center mb-3">
                  <h2 class="text-sm font-bold uppercase tracking-wider text-indigo-400">Roster Selection</h2>
                  <span class="text-xs text-slate-500">{activeAthletes.length} / {athletes.length} Active</span>
                </div>
                <div class="space-y-1.5 max-h-64 overflow-y-auto pr-1">
                  {athletes.map(ath => (
                    <label key={ath.id} class={`flex items-center justify-between p-2.5 rounded-lg border text-sm cursor-pointer transition-all ${ath.selected ? 'bg-indigo-950/40 border-indigo-500/50 text-indigo-100 font-semibold' : 'bg-slate-950 border-slate-800 text-slate-500 hover:text-slate-300'}`}>
                      <div class="flex items-center gap-3">
                        <input type="checkbox" checked={ath.selected} onChange={() => toggleAthleteSelection(ath.id)} class="rounded border-slate-700 text-indigo-600 h-4 w-4" />
                        <span>{ath.name}</span>
                      </div>
                      <span class="text-xs font-mono text-slate-400">VDOT {ath.vdot} | {ath.fiveKPR}</span>
                    </label>
                  ))}
                </div>
              </div>

              {/* Add Athlete */}
              <div class="bg-slate-900 p-5 rounded-xl border border-slate-800">
                <h2 class="text-sm font-bold uppercase tracking-wider text-indigo-400 mb-3">Add New Athlete</h2>
                <form onSubmit={handleAddAthlete} class="space-y-3">
                  <div>
                    <input type="text" placeholder="Athlete Name" value={newAthleteName} onChange={e => setNewAthleteName(e.target.value)} class="w-full bg-slate-950 border border-slate-800 rounded-md px-3 py-2 text-white text-sm outline-none focus:border-indigo-500" />
                  </div>
                  <div class="grid grid-cols-2 gap-2">
                    <input type="text" placeholder="5K PR (18:30)" value={newAthlete5k} onChange={e => setNewAthlete5k(e.target.value)} class="bg-slate-950 border border-slate-800 rounded-md px-3 py-2 text-white text-sm outline-none focus:border-indigo-500" />
                    <input type="number" step="0.1" placeholder="Manual VDOT" value={customVdot} onChange={e => setCustomVdot(e.target.value)} class="bg-slate-950 border border-slate-800 rounded-md px-3 py-2 text-white text-sm outline-none focus:border-indigo-500" />
                  </div>
                  <button type="submit" class="w-full bg-slate-800 hover:bg-slate-700 text-slate-200 border border-slate-700 font-semibold py-2 rounded-md text-sm transition-colors">Add to Roster</button>
                </form>
              </div>

            </div>

            {/* Right Live Grid (8 Columns) */}
            <div class="col-span-8">
              <div class="grid grid-cols-2 gap-4">
                {activeAthletes.map(ath => {
                  const targetSplitSecs = calculateZoneTargetSplit(ath.vdot, distance, workoutType);
                  const currentRepNumber = ath.splits.length + 1;

                  return (
                    <div key={ath.id} class={`p-5 rounded-xl border transition-all ${ath.status === 'running' ? 'bg-slate-900 border-emerald-500 ring-1 ring-emerald-500' : ath.status === 'resting' ? 'bg-slate-900 border-amber-500' : 'bg-slate-900 border-slate-800'}`}>
                      <div class="flex justify-between items-start mb-3">
                        <div>
                          <h3 class="font-bold text-xl text-slate-100">{ath.name}</h3>
                          <div class="text-xs text-slate-400 mt-0.5">VDOT: <span class="font-bold text-indigo-400">{ath.vdot}</span> | 5K PR: {ath.fiveKPR}</div>
                        </div>
                        <div class="text-right">
                          <span class="text-xs font-bold px-3 py-1 rounded-full bg-slate-950 border border-slate-800 text-slate-300">
                            Rep {Math.min(currentRepNumber, totalReps)} / {totalReps}
                          </span>
                        </div>
                      </div>

                      <div class="bg-slate-950 p-4 rounded-lg border border-slate-800 mb-4">
                        <div class="flex justify-between items-center text-xs text-slate-400 pb-2 border-b border-slate-800/80">
                          <span>Target Pace ({workoutType}):</span>
                          <span class="font-mono text-indigo-300 font-bold text-sm">{formatTime(targetSplitSecs)}</span>
                        </div>

                        <div class="flex justify-between items-end mt-3">
                          <div>
                            <div class="text-xs text-slate-500 font-bold uppercase">Rep Time</div>
                            <div class={`text-4xl font-mono font-black ${ath.status === 'running' ? 'text-emerald-400' : 'text-slate-100'}`}>
                              {ath.status === 'running' ? formatTime(ath.currentSplit) : formatTime(ath.splits[ath.splits.length - 1] || 0)}
                            </div>
                          </div>

                          {ath.status === 'resting' && (
                            <div class="text-right">
                              <div class="text-xs text-amber-400 font-bold uppercase">Resting</div>
                              <div class="text-2xl font-mono font-bold text-amber-300">{formatTime(ath.currentRest)}</div>
                            </div>
                          )}
                        </div>
                      </div>

                      <div class="mb-3">
                        {ath.status === 'running' && <button onClick={() => handleStopIndividual(ath.id)} class="w-full bg-rose-600 hover:bg-rose-500 text-white font-bold py-3 rounded-lg text-lg transition-colors">STOP REP {currentRepNumber}</button>}
                        {ath.status === 'resting' && <button onClick={() => handleStartNextRep(ath.id)} class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-2.5 rounded-lg transition-colors">START REP {currentRepNumber}</button>}
                        {ath.status === 'idle' && <button onClick={() => handleStopIndividual(ath.id)} disabled class="w-full bg-slate-800 text-slate-600 font-semibold py-2.5 rounded-lg cursor-not-allowed">Ready</button>}
                      </div>

                      {/* Split History Log */}
                      {ath.splits.length > 0 && (
                        <div class="pt-3 border-t border-slate-800">
                          <div class="text-xs font-bold text-slate-500 uppercase mb-2">Completed Splits</div>
                          <div class="flex flex-wrap gap-2">
                            {ath.splits.map((s, i) => (
                              <div key={i} class="text-xs font-mono px-2.5 py-1 rounded bg-slate-950 border border-slate-800 text-indigo-300">
                                R{i+1}: <span class="font-bold text-slate-200">{formatTime(s)}</span>
                              </div>
                            ))}
                          </div>
                        </div>
                      )}

                    </div>
                  );
                })}
              </div>
            </div>

          </div>
        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
