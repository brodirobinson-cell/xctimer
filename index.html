<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Workout Hub & Coaching Dashboard</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
            --accent-hover: #0284c7;
            --success-color: #22c55e;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
            --border-color: #334155;
            --subtext-color: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 24px;
            max-width: 1350px;
            margin: 0 auto;
            min-height: 100vh;
        }

        header {
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        h1 {
            font-size: 1.8rem;
            color: var(--accent-color);
        }

        .subtitle {
            color: var(--subtext-color);
            font-size: 0.9rem;
            margin-top: 4px;
        }

        /* Toolbar & Controls */
        .toolbar {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .toolbar-row {
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: space-between;
        }

        .toolbar-group {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        label {
            font-size: 0.85rem;
            color: var(--subtext-color);
            font-weight: 600;
        }

        select, input {
            background-color: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.9rem;
            outline: none;
        }

        select:focus, input:focus {
            border-color: var(--accent-color);
        }

        button {
            background-color: var(--accent-color);
            color: var(--bg-color);
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        button.btn-secondary {
            background-color: #334155;
            color: var(--text-color);
        }

        button.btn-secondary:hover {
            background-color: #475569;
        }

        button.danger {
            background-color: var(--danger-color);
            color: white;
        }

        button.danger:hover {
            background-color: #dc2626;
        }

        /* Grid & Cards */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .athlete-name {
            font-size: 1.1rem;
            font-weight: bold;
        }

        .pb-badge {
            background-color: #334155;
            color: var(--accent-color);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .target-pace {
            font-size: 0.88rem;
            color: var(--text-color);
            background-color: var(--bg-color);
            padding: 8px 12px;
            border-radius: 6px;
            border-left: 4px solid var(--accent-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .target-pace strong {
            color: var(--accent-color);
            font-size: 1.05rem;
        }

        .timer-display {
            font-size: 2.5rem;
            font-family: monospace;
            font-weight: bold;
            text-align: center;
            margin: 6px 0;
            color: var(--accent-color);
        }

        .card-actions {
            display: flex;
            gap: 8px;
        }

        .card-actions button {
            flex: 1;
            justify-content: center;
        }

        .splits-list {
            list-style: none;
            max-height: 140px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 8px 12px;
            background-color: var(--bg-color);
            font-family: monospace;
            font-size: 0.85rem;
        }

        .splits-list li {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px dashed #334155;
        }

        .splits-list li:last-child {
            border-bottom: none;
        }

        /* Insights Panel */
        .insights-panel {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            margin-top: 24px;
        }

        .insights-header {
            font-size: 1.1rem;
            margin-bottom: 16px;
            color: var(--accent-color);
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
        }

        .metric-item {
            background-color: var(--bg-color);
            padding: 14px;
            border-radius: 6px;
            border-left: 4px solid var(--accent-color);
        }

        .metric-label {
            font-size: 0.85rem;
            color: var(--subtext-color);
            margin-bottom: 6px;
        }

        .metric-value {
            font-size: 1.2rem;
            font-weight: bold;
        }

        .flag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            margin-top: 6px;
        }

        .flag-success {
            background-color: rgba(34, 197, 94, 0.2);
            color: var(--success-color);
        }

        .flag-warning {
            background-color: rgba(245, 158, 11, 0.2);
            color: var(--warning-color);
        }
    </style>
</head>
<body>

    <header>
        <div>
            <h1>Track Workout Hub</h1>
            <p class="subtitle">Real-Time Split Tracking & PB-Driven Pace Targets</p>
        </div>
        <div style="display: flex; gap: 10px;">
            <button id="start-all-btn">▶ Start All Timers</button>
            <button id="reset-all-btn" class="danger">↺ Reset Session</button>
        </div>
    </header>

    <!-- Controls Toolbar -->
    <div class="toolbar">
        <!-- Flexible Workout Designer -->
        <div class="toolbar-row">
            <div class="toolbar-group">
                <div>
                    <label for="workout-dist">Rep Distance (m):</label><br>
                    <input type="number" id="workout-dist" value="400" step="50" style="width: 100px;" onchange="renderAthletes()">
                </div>
                <div>
                    <label for="workout-zone">Target Effort Zone:</label><br>
                    <select id="workout-zone" onchange="renderAthletes()">
                        <option value="I">Interval Zone (~3k/5k Race Pace)</option>
                        <option value="R">Repetition Zone (Speed / <1k Pace)</option>
                        <option value="T">Threshold Zone (~10k/HM Pace)</option>
                        <option value="E">Easy / Aerobic Zone</option>
                    </select>
                </div>
                <div>
                    <label for="workout-rest">Rest Interval:</label><br>
                    <input type="text" id="workout-rest" value="60s" placeholder="e.g. 60s or 1:30" style="width: 110px;" onchange="renderAthletes()">
                </div>
            </div>

            <div class="toolbar-group">
                <button onclick="exportDataCSV()" class="btn-secondary">📥 Export CSV</button>
                <button onclick="exportDataJSON()" class="btn-secondary">💾 Export JSON</button>
            </div>
        </div>

        <hr style="border: none; border-top: 1px solid var(--border-color);">

        <!-- Add Athlete with Race PB -->
        <div class="toolbar-row">
            <div class="toolbar-group" style="width: 100%;">
                <div>
                    <label for="new-name">Athlete Name:</label><br>
                    <input type="text" id="new-name" placeholder="e.g. Alex" style="width: 130px;">
                </div>
                <div>
                    <label for="new-pb-dist">PB Event:</label><br>
                    <select id="new-pb-dist">
                        <option value="1km">1 km</option>
                        <option value="3km" selected>3 km</option>
                        <option value="5km">5 km</option>
                        <option value="10km">10 km</option>
                    </select>
                </div>
                <div>
                    <label for="new-pb-time">PB Time (MM:SS):</label><br>
                    <input type="text" id="new-pb-time" placeholder="09:45" style="width: 100px;">
                </div>
                <div style="align-self: flex-end;">
                    <button onclick="addAthleteFromInput()" class="btn-secondary">+ Add Athlete</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Runner Cards Grid -->
    <div class="grid" id="runner-grid"></div>

    <!-- Workout Insights Panel -->
    <div class="insights-panel">
        <div class="insights-header">
            <span>📊</span> Workout Insights Panel
        </div>
        <div class="metrics-grid">
            <div class="metric-item">
                <div class="metric-label">Group Target Compliance</div>
                <div class="metric-value" id="group-compliance">95% On Pace</div>
                <div class="flag flag-success">Target Zone Met</div>
            </div>
            <div class="metric-item">
                <div class="metric-label">Pace Progression Alert</div>
                <div class="metric-value" id="vdot-flag">2 Athletes Ready</div>
                <div class="flag flag-warning">Consider Faster Target</div>
            </div>
            <div class="metric-item">
                <div class="metric-label">Performance Decay Alert</div>
                <div class="metric-value" id="decay-alert">None Detected</div>
                <div class="flag flag-success">Pacing Stable</div>
            </div>
        </div>
    </div>

    <script>
        // System State
        let running = false;
        let startTime = 0;
        let elapsedTime = 0;
        let timerInterval = null;

        // Default roster initialized with Race PBs
        let athletes = [
            { id: 1, name: "Runner 1", pbDist: "3km", pbTime: "09:30", splits: [] },
            { id: 2, name: "Runner 2", pbDist: "5km", pbTime: "17:15", splits: [] },
            { id: 3, name: "Runner 3", pbDist: "10km", pbTime: "38:00", splits: [] }
        ];

        // Helper: Convert MM:SS or M:SS to total seconds
        function parseTimeToSeconds(timeStr) {
            if (!timeStr || !timeStr.includes(':')) return 0;
            const parts = timeStr.trim().split(':');
            const mins = parseFloat(parts[0]) || 0;
            const secs = parseFloat(parts[1]) || 0;
            return (mins * 60) + secs;
        }

        // Helper: Format total seconds to MM:SS.s or SS.s
        function formatSecondsToPace(totalSec) {
            if (isNaN(totalSec) || totalSec <= 0) return "--:--";
            if (totalSec < 60) {
                return `${totalSec.toFixed(1)}s`;
            }
            const mins = Math.floor(totalSec / 60);
            const secs = (totalSec % 60).toFixed(1);
            const formattedSecs = secs < 10 ? `0${secs}` : secs;
            return `${mins}:${formattedSecs}`;
        }

        // Calculate custom target split based on Athlete's PB, Rep Distance, and Intensity Zone
        function calculateTargetSplit(athlete, repDistMeters, zone) {
            const pbSec = parseTimeToSeconds(athlete.pbTime);
            if (pbSec <= 0) return "Set valid PB";

            let basePace1k = 0;
            if (athlete.pbDist === "1km") basePace1k = pbSec;
            else if (athlete.pbDist === "3km") basePace1k = pbSec / 3;
            else if (athlete.pbDist === "5km") basePace1k = pbSec / 5;
            else if (athlete.pbDist === "10km") basePace1k = pbSec / 10;

            let zoneMultiplier = 1.0;
            if (zone === 'R') zoneMultiplier = 0.94;
            else if (zone === 'I') zoneMultiplier = 1.00;
            else if (zone === 'T') zoneMultiplier = 1.08;
            else if (zone === 'E') zoneMultiplier = 1.22;

            const targetPacePerMeter = (basePace1k / 1000) * zoneMultiplier;
            const repTargetSec = targetPacePerMeter * repDistMeters;

            return formatSecondsToPace(repTargetSec);
        }

        function formatTime(ms) {
            const totalSeconds = Math.floor(ms / 1000);
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;
            const tenths = Math.floor((ms % 1000) / 100);
            return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}.${tenths}`;
        }

        function renderAthletes() {
            const grid = document.getElementById('runner-grid');
            const repDist = parseFloat(document.getElementById('workout-dist').value) || 400;
            const zone = document.getElementById('workout-zone').value;
            const rest = document.getElementById('workout-rest').value.trim() || "60s";
            grid.innerHTML = '';

            athletes.forEach(athlete => {
                const targetSplit = calculateTargetSplit(athlete, repDist, zone);
                const card = document.createElement('div');
                card.className = 'card';
                card.id = `card-${athlete.id}`;

                let splitsHTML = athlete.splits.map((s, idx) => 
                    `<li><span>Split ${idx + 1}</span><span>${s}</span></li>`
                ).reverse().join('');

                if (athlete.splits.length === 0) {
                    splitsHTML = '<li><span>Split 1</span><span>--:--</span></li>';
                }

                card.innerHTML = `
                    <div class="card-header">
                        <span class="athlete-name">${athlete.name}</span>
                        <span class="pb-badge">PB (${athlete.pbDist}): ${athlete.pbTime}</span>
                    </div>
                    <div class="target-pace">
                        <span>🎯 Target (${repDist}m @ ${zone}-Zone):</span>
                        <span><strong>${targetSplit}</strong> <span style="color: var(--subtext-color); font-size: 0.8rem;">(Rest: ${rest})</span></span>
                    </div>
                    <div class="timer-display" id="timer-${athlete.id}">${formatTime(elapsedTime)}</div>
                    <div class="card-actions">
                        <button onclick="recordSplit(${athlete.id})">⏱ Record Split</button>
                        <button class="btn-secondary" onclick="removeAthlete(${athlete.id})">✕</button>
                    </div>
                    <ul class="splits-list" id="splits-${athlete.id}">
                        ${splitsHTML}
                    </ul>
                `;
                grid.appendChild(card);
            });
        }

        function updateTimers() {
            const now = Date.now();
            const currentMs = elapsedTime + (now - startTime);
            const formatted = formatTime(currentMs);

            athletes.forEach(athlete => {
                const timerEl = document.getElementById(`timer-${athlete.id}`);
                if (timerEl) timerEl.textContent = formatted;
            });
        }

        document.getElementById('start-all-btn').addEventListener('click', function() {
            if (!running) {
                running = true;
                startTime = Date.now();
                timerInterval = setInterval(updateTimers, 100);
                this.textContent = '⏸ Pause All';
                this.classList.add('danger');
            } else {
                running = false;
                elapsedTime += Date.now() - startTime;
                clearInterval(timerInterval);
                this.textContent = '▶ Start All Timers';
                this.classList.remove('danger');
            }
        });

        document.getElementById('reset-all-btn').addEventListener('click', function() {
            running = false;
            clearInterval(timerInterval);
            elapsedTime = 0;
            const startBtn = document.getElementById('start-all-btn');
            startBtn.textContent = '▶ Start All Timers';
            startBtn.classList.remove('danger');

            athletes.forEach(a => a.splits = []);
            renderAthletes();
        });

        function recordSplit(id) {
            const timerEl = document.getElementById(`timer-${id}`);
            const athlete = athletes.find(a => a.id === id);
            if (timerEl && athlete) {
                const splitVal = timerEl.textContent;
                athlete.splits.push(splitVal);
                renderAthletes();
            }
        }

        function addAthleteFromInput() {
            const nameInput = document.getElementById('new-name');
            const pbDistSelect = document.getElementById('new-pb-dist');
            const pbTimeInput = document.getElementById('new-pb-time');

            const name = nameInput.value.trim() || `Runner ${athletes.length + 1}`;
            const pbDist = pbDistSelect.value;
            const pbTime = pbTimeInput.value.trim() || "10:00";

            const newId = athletes.length > 0 ? Math.max(...athletes.map(a => a.id)) + 1 : 1;
            athletes.push({ id: newId, name: name, pbDist: pbDist, pbTime: pbTime, splits: [] });

            nameInput.value = '';
            pbTimeInput.value = '';
            renderAthletes();
        }

        function removeAthlete(id) {
            athletes = athletes.filter(a => a.id !== id);
            renderAthletes();
        }

        // --- Exports ---
        function exportDataCSV() {
            const repDist = document.getElementById('workout-dist').value;
            const zone = document.getElementById('workout-zone').value;
            const rest = document.getElementById('workout-rest').value;
            let csv = `Athlete Name,PB Event,PB Time,Workout Distance,Zone,Rest Interval,Target Split,Split Number,Recorded Time\n`;
            
            athletes.forEach(a => {
                const target = calculateTargetSplit(a, repDist, zone);
                if (a.splits.length === 0) {
                    csv += `"${a.name}",${a.pbDist},${a.pbTime},${repDist}m,Zone ${zone},"${rest}",${target},No Splits,--:--\n`;
                } else {
                    a.splits.forEach((s, idx) => {
                        csv += `"${a.name}",${a.pbDist},${a.pbTime},${repDist}m,Zone ${zone},"${rest}",${target},Split ${idx + 1},${s}\n`;
                    });
                }
            });

            downloadBlob(csv, `track_workout_${new Date().toISOString().slice(0,10)}.csv`, 'text/csv');
        }

        function exportDataJSON() {
            const data = {
                repDistanceMeters: document.getElementById('workout-dist').value,
                effortZone: document.getElementById('workout-zone').value,
                restInterval: document.getElementById('workout-rest').value,
                date: new Date().toISOString(),
                athletes: athletes
            };
            downloadBlob(JSON.stringify(data, null, 2), `track_workout_${new Date().toISOString().slice(0,10)}.json`, 'application/json');
        }

        function downloadBlob(content, filename, contentType) {
            const blob = new Blob([content], { type: contentType });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        }

        // Initial Render
        renderAthletes();
    </script>
</body>
</html>
