<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>XC Trackside Timer</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --accent: #6366f1;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --text: #f8fafc;
      --subtext: #94a3b8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
    body { background-color: var(--bg); color: var(--text); padding: 12px; padding-bottom: 40px; }
    
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #334155; }
    h1 { font-size: 1.25rem; font-weight: 800; color: #818cf8; }
    
    .btn { background: var(--accent); color: white; border: none; padding: 10px 14px; font-weight: 700; border-radius: 8px; font-size: 0.9rem; cursor: pointer; }
    .btn-success { background: var(--success); }
    .btn-danger { background: var(--danger); }
    .btn-reset { background: #334155; color: var(--subtext); }
    .btn-big { width: 100%; padding: 16px; font-size: 1.2rem; border-radius: 12px; text-transform: uppercase; tracking: 1px; }

    .modes { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 16px; }
    .mode-btn { background: var(--card); border: 1px solid #334155; padding: 10px; border-radius: 8px; color: var(--subtext); text-align: left; cursor: pointer; }
    .mode-btn.active { border-color: var(--accent); background: #312e81; color: white; font-weight: bold; }
    .mode-btn div:first-child { font-size: 0.85rem; }
    .mode-btn div:last-child { font-size: 0.7rem; opacity: 0.7; }

    .params { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; background: var(--card); padding: 10px; border-radius: 8px; margin-bottom: 16px; }
    .param-box label { display: block; font-size: 0.65rem; color: var(--subtext); text-transform: uppercase; margin-bottom: 4px; }
    .param-box input { width: 100%; background: #0f172a; border: 1px solid #334155; color: white; padding: 6px; border-radius: 6px; font-family: monospace; font-size: 0.9rem; }

    .runner-card { background: var(--card); border: 2px solid #334155; border-radius: 14px; padding: 14px; margin-bottom: 12px; }
    .runner-card.running { border-color: var(--success); }
    .runner-card.resting { border-color: var(--warning); }
    
    .runner-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
    .runner-name { font-size: 1.1rem; font-weight: 700; }
    .runner-vdot { font-size: 0.75rem; color: var(--subtext); }

    .timer-display { background: #0f172a; border-radius: 8px; padding: 12px; margin: 10px 0; display: flex; justify-content: space-between; align-items: center; }
    .time-val { font-family: monospace; font-size: 2.2rem; font-weight: 800; }
    .running .time-val { color: var(--success); }
    .resting-val { font-family: monospace; font-size: 1.4rem; color: var(--warning); text-align: right; }

    .splits-list { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; font-family: monospace; font-size: 0.75rem; color: #a5b4fc; }
    .split-chip { background: #0f172a; padding: 2px 6px; border-radius: 4px; }
  </style>
</head>
<body>

  <header>
    <h1>XC Trackside Timer</h1>
    <div>
      <button class="btn btn-reset" onclick="resetAll()">Reset</button>
      <button class="btn" onclick="exportCSV()">CSV</button>
    </div>
  </header>

  <!-- Workout Mode -->
  <div class="modes">
    <button class="mode-btn active" id="btn-INTERVAL" onclick="setMode('INTERVAL')">
      <div>Intervals</div><div>VO2max (3k-5k)</div>
    </button>
    <button class="mode-btn" id="btn-TEMPO" onclick="setMode('TEMPO')">
      <div>Tempo</div><div>Threshold Work</div>
    </button>
    <button class="mode-btn" id="btn-REP" onclick="setMode('REP')">
      <div>Speed Reps</div><div>Economy / Speed</div>
    </button>
    <button class="mode-btn" id="btn-EASY" onclick="setMode('EASY')">
      <div>Easy / Recovery</div><div>Continuous Run</div>
    </button>
  </div>

  <!-- Parameters -->
  <div class="params">
    <div class="param-box">
      <label>Distance (m)</label>
      <input type="number" id="cfg-dist" value="800" onchange="render()">
    </div>
    <div class="param-box">
      <label>Reps</label>
      <input type="number" id="cfg-reps" value="5">
    </div>
    <div class="param-box">
      <label>Rest (s)</label>
      <input type="number" id="cfg-rest" value="120">
    </div>
  </div>

  <button class="btn btn-success btn-big" style="margin-bottom: 16px;" onclick="startAll()">▶ START ALL RUNNERS</button>

  <div id="roster"></div>

  <script>
    let currentMode = 'INTERVAL';
    let isRunning = false;
    let animFrame;

    const INTENSITY = { EASY: 0.70, TEMPO: 0.88, INTERVAL: 0.98, REP: 1.08 };

    let athletes = [
      { id: 1, name: 'Alex M.', vdot: 57.8, status: 'idle', splits: [], start: 0, current: 0, restStart: 0, restCurrent: 0 },
      { id: 2, name: 'Jordan T.', vdot: 53.2, status: 'idle', splits: [], start: 0, current: 0, restStart: 0, restCurrent: 0 },
      { id: 3, name: 'Sam K.', vdot: 63.1, status: 'idle', splits: [], start: 0, current: 0, restStart: 0, restCurrent: 0 }
    ];

    function setMode(mode) {
      currentMode = mode;
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(`btn-${mode}`).classList.add('active');
      
      if(mode === 'EASY') { document.getElementById('cfg-dist').value = 5000; document.getElementById('cfg-reps').value = 1; }
      if(mode === 'TEMPO') { document.getElementById('cfg-dist').value = 1600; document.getElementById('cfg-reps').value = 3; }
      if(mode === 'INTERVAL') { document.getElementById('cfg-dist').value = 800; document.getElementById('cfg-reps').value = 5; }
      if(mode === 'REP') { document.getElementById('cfg-dist').value = 400; document.getElementById('cfg-reps').value = 8; }
      render();
    }

    function formatTime(s) {
      if (!s || s <= 0) return "00:00.0";
      const m = Math.floor(s / 60);
      const secs = (s % 60).toFixed(1);
      return `${m}:${secs < 10 ? '0' : ''}${secs}`;
    }

    function calcTarget(vdot, meters, mode) {
      if (!vdot) return 0;
      const targetVO2 = vdot * (INTENSITY[mode] || 0.98);
      const a = 0.000104, b = 0.182258, c = -(4.60 + targetVO2);
      const v = (-b + Math.sqrt(b * b - 4 * a * c)) / (2 * a);
      return (1 / v) * meters * 60;
    }

    function startAll() {
      const now = Date.now();
      isRunning = true;
      athletes.forEach(a => {
        a.status = 'running';
        a.start = now;
        a.current = 0;
      });
      loop();
    }

    function stopAthlete(id) {
      const now = Date.now();
      const a = athletes.find(x => x.id === id);
      if (a && a.status === 'running') {
        a.splits.push(a.current);
        a.status = 'resting';
        a.restStart = now;
        a.restCurrent = 0;
        render();
      }
    }

    function nextRep(id) {
      const now = Date.now();
      const a = athletes.find(x => x.id === id);
      if (a && a.status === 'resting') {
        a.status = 'running';
        a.start = now;
        a.current = 0;
        render();
      }
    }

    function resetAll() {
      isRunning = false;
      cancelAnimationFrame(animFrame);
      athletes.forEach(a => {
        a.status = 'idle';
        a.splits = [];
        a.current = 0;
        a.restCurrent = 0;
      });
      render();
    }

    function loop() {
      if (!isRunning) return;
      const now = Date.now();
      athletes.forEach(a => {
        if (a.status === 'running') a.current = (now - a.start) / 1000;
        if (a.status === 'resting') a.restCurrent = (now - a.restStart) / 1000;
      });
      updateDisplays();
      animFrame = requestAnimationFrame(loop);
    }

    function updateDisplays() {
      athletes.forEach(a => {
        const timeEl = document.getElementById(`time-${a.id}`);
        const restEl = document.getElementById(`rest-${a.id}`);
        if (timeEl && a.status === 'running') timeEl.innerText = formatTime(a.current);
        if (restEl && a.status === 'resting') restEl.innerText = formatTime(a.restCurrent);
      });
    }

    function render() {
      const container = document.getElementById('roster');
      const dist = Number(document.getElementById('cfg-dist').value) || 800;
      const totalReps = Number(document.getElementById('cfg-reps').value) || 5;

      container.innerHTML = athletes.map(a => {
        const targetSecs = calcTarget(a.vdot, dist, currentMode);
        const repNum = a.splits.length + 1;

        return `
          <div class="runner-card ${a.status}">
            <div class="runner-header">
              <div class="runner-name">${a.name}</div>
              <div class="runner-vdot">VDOT: <b>${a.vdot}</b> | Target: <b>${formatTime(targetSecs)}</b></div>
            </div>

            <div class="timer-display">
              <div>
                <div style="font-size: 0.65rem; color: var(--subtext); text-transform: uppercase;">Rep ${Math.min(repNum, totalReps)} / ${totalReps}</div>
                <div class="time-val" id="time-${a.id}">${a.status === 'running' ? formatTime(a.current) : formatTime(a.splits[a.splits.length - 1])}</div>
              </div>
              ${a.status === 'resting' ? `
                <div>
                  <div style="font-size: 0.65rem; color: var(--warning); text-transform: uppercase; text-align: right;">Resting</div>
                  <div class="resting-val" id="rest-${a.id}">${formatTime(a.restCurrent)}</div>
                </div>
              ` : ''}
            </div>

            ${a.status === 'running' ? `<button class="btn btn-danger btn-big" onclick="stopAthlete(${a.id})">STOP REP ${repNum}</button>` : ''}
            ${a.status === 'resting' ? `<button class="btn btn-success btn-big" onclick="nextRep(${a.id})">START REP ${repNum}</button>` : ''}

            ${a.splits.length > 0 ? `
              <div class="splits-list">
                ${a.splits.map((s, i) => `<span class="split-chip">R${i+1}: ${formatTime(s)}</span>`).join('')}
              </div>
            ` : ''}
          </div>
        `;
      }).join('');
    }

    function exportCSV() {
      let csv = `Athlete,VDOT,Splits\n`;
      athletes.forEach(a => {
        csv += `"${a.name}",${a.vdot},"${a.splits.map(s => formatTime(s)).join(' | ')}"\n`;
      });
      const blob = new Blob([csv], { type: 'text/csv' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `XC_Workout_${new Date().toISOString().slice(0,10)}.csv`;
      a.click();
    }

    render();
  </script>
</body>
</html>
