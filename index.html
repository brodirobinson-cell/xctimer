<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XC Multi-Timer & Multi-Workout VDOT Tracker</title>
  <!-- Production React Builds -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <!-- Fast Minified Tailwind CSS -->
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
  <div id="root"></div>

  <script>
    const e = React.createElement;
    const { useState, useEffect } = React;

    // --- TIME & PACING CALCULATIONS ---
    function parseTimeToSeconds(timeStr) {
      if (!timeStr) return 0;
      const parts = timeStr.trim().split(':');
      if (parts.length === 2) return parseInt(parts[0], 10) * 60 + parseFloat(parts[1]);
      return parseFloat(timeStr) || 0;
    }

    function formatTime(seconds) {
      if (!seconds || isNaN(seconds) || seconds <= 0) return "00:00.0";
      const mins = Math.floor(seconds / 60);
      const secs = (seconds % 60).toFixed(1);
      return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
    }

    function calculateVDOT(fiveKSeconds) {
      if (!fiveKSeconds || fiveKSeconds <= 0) return 0;
      const t = fiveKSeconds / 60;
      const v = 5000 / t;
      const vo2 = -4.60 + 0.182258 * v + 0.000104 * Math.pow(v, 2);
      const percentMax = 0.8 + 0.1894393 * Math.exp(-0.012778 * t) + 0.2989558 * Math.exp(-0.1932605 * t);
      return (vo2 / percentMax).toFixed(1);
    }

    const ZONE_INTENSITY = {
      EASY: 0.70,
      TEMPO: 0.88,
      INTERVAL: 0.98,
      REP: 1.08
    };

    function calculateZoneTargetSplit(vdot, distanceMeters, zoneKey) {
      if (!vdot || vdot <= 0) return 0;
      const intensity = ZONE_INTENSITY[zoneKey] || 0.98;
      const targetVO2 = vdot * intensity;
      const a = 0.000104, b = 0.182258, c = -(4.60 + targetVO2);
      const v = (-b + Math.sqrt(b * b - 4 * a * c)) / (2 * a);
      const pacePerMeter = 1 / v;
      return (pacePerMeter * distanceMeters * 60);
    }

    function App() {
      const [workoutType, setWorkoutType] = useState('INTERVAL');
      const [distance, setDistance] = useState(800);
      const [totalReps, setTotalReps] = useState(5);
      const [targetRest, setTargetRest] = useState(120);

      const [athletes, setAthletes] = useState([
        { id: '1', name: 'Alex M.', fiveKPR: '17:30', vdot: 57.8, selected: true, splits: [], restTimes: [], status: 'idle', startTime: 0, currentSplit: 0, currentRest: 0 },
        { id: '2', name: 'Jordan T.', fiveKPR: '18:45', vdot: 53.2, selected: true, splits: [], restTimes: [], status: 'idle', startTime: 0, currentSplit: 0, currentRest: 0 },
        { id: '3', name: 'Sam K.', fiveKPR: '16:15', vdot: 63.1, selected: true, splits: [], restTimes: [], status: 'idle', startTime: 0, currentSplit: 0, currentRest: 0 }
      ]);

      const [newAthleteName, setNewAthleteName] = useState('');
      const [newAthlete5k, setNewAthlete5k] = useState('');
      const [customVdot, setCustomVdot] = useState('');
      const [isTimerRunning, setIsTimerRunning] = useState(false);

      const handleWorkoutTypeChange = (mode) => {
        setWorkoutType(mode);
        if (mode === 'EASY') { setDistance(5000); setTotalReps(1); setTargetRest(0); }
        else if (mode === 'TEMPO') { setDistance(1600); setTotalReps(3); setTargetRest(60); }
        else if (mode === 'INTERVAL') { setDistance(800); setTotalReps(5); setTargetRest(120); }
        else if (mode === 'REP') { setDistance(400); setTotalReps(8); setTargetRest(180); }
      };

      useEffect(() => {
        let animationFrameId;
        const updateTimers = () => {
          const now = Date.now();
          setAthletes(prevAthletes =>
            prevAthletes.map(ath => {
              if (!ath.selected) return ath;
              if (ath.status === 'running') {
                return { ...ath, currentSplit: (now - ath.startTime) / 1000 };
              } else if (ath.status === 'resting') {
                return { ...ath, currentRest: (now - ath.restStartTime) / 1000 };
              }
              return ath;
            })
          );
          if (isTimerRunning) animationFrameId = requestAnimationFrame(updateTimers);
        };

        if (isTimerRunning) animationFrameId = requestAnimationFrame(updateTimers);
        return () => cancelAnimationFrame(animationFrameId);
      }, [isTimerRunning]);

      const toggleAthleteSelection = (id) => {
        setAthletes(prev => prev.map(ath => ath.id === id ? { ...ath, selected: !ath.selected } : ath));
      };

      const handleStartAll = () => {
        const now = Date.now();
        setIsTimerRunning(true);
        setAthletes(prev => prev.map(ath => ath.selected ? { ...ath, status: 'running', startTime: now, currentSplit: 0 } : ath));
      };

      const handleStopIndividual = (id) => {
        const now = Date.now();
        setAthletes(prev => prev.map(ath => {
          if (ath.id === id && ath.status === 'running') {
            return { ...ath, status: 'resting', splits: [...ath.splits, ath.currentSplit], restStartTime: now, currentRest: 0 };
          }
          return ath;
        }));
      };

      const handleStartNextRep = (id) => {
        const now = Date.now();
        setAthletes(prev => prev.map(ath => {
          if (ath.id === id && ath.status === 'resting') {
            return { ...ath, status: 'running', restTimes: [...ath.restTimes, ath.currentRest], startTime: now, currentSplit: 0 };
          }
          return ath;
        }));
      };

      const handleResetAll = () => {
        setIsTimerRunning(false);
        setAthletes(prev => prev.map(ath => ({ ...ath, status: 'idle', splits: [], restTimes: [], currentSplit: 0, currentRest: 0 })));
      };

      const handleAddAthlete = (ev) => {
        ev.preventDefault();
        if (!newAthleteName) return;
        let computedVdot = customVdot ? parseFloat(customVdot) : calculateVDOT(parseTimeToSeconds(newAthlete5k));
        setAthletes([...athletes, {
          id: Date.now().toString(),
          name: newAthleteName,
          fiveKPR: newAthlete5k || 'N/A',
          vdot: computedVdot > 0 ? computedVdot : 50,
          selected: true, splits: [], restTimes: [], status: 'idle', startTime: 0, currentSplit: 0, currentRest: 0
        }]);
        setNewAthleteName(''); setNewAthlete5k(''); setCustomVdot('');
      };

      const handleExportCSV = () => {
        let csvContent = `data:text/csv;charset=utf-8,Workout Mode: ${workoutType},Distance: ${distance}m\nAthlete,5K PR,VDOT`;
        for (let i = 1; i <= totalReps; i++) csvContent += `,Rep ${i} Split,Rep ${i} Rest`;
        csvContent += "\n";

        athletes.filter(a => a.selected).forEach(ath => {
          let row = `"${ath.name}","${ath.fiveKPR}",${ath.vdot}`;
          for (let i = 0; i < totalReps; i++) row += `,${formatTime(ath.splits[i] || 0)},${formatTime(ath.restTimes[i] || 0)}`;
          csvContent += row + "\n";
        });

        const link = document.createElement("a");
        link.setAttribute("href", encodeURI(csvContent));
        link.setAttribute("download", `XC_${workoutType}_${distance}m_${new Date().toISOString().slice(0,10)}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      const activeAthletes = athletes.filter(a => a.selected);

      return e('div', { className: 'max-w-7xl mx-auto p-4 sm:p-6' },
        // Header
        e('div', { className: 'flex flex-col md:flex-row md:items-center justify-between border-b border-gray-700 pb-4 mb-6 gap-4' },
          e('div', null,
            e('h1', { className: 'text-3xl font-extrabold text-indigo-400 tracking-tight' }, 'XC Workout & Multi-Timer'),
            e('p', { className: 'text-gray-400 text-sm' }, 'Jack Daniels VDOT Pace Generator for Easy, Tempo, Interval & Speed Workouts')
          ),
          e('div', { className: 'flex gap-2' },
            e('button', { onClick: handleStartAll, className: 'bg-emerald-600 hover:bg-emerald-500 text-white px-5 py-2.5 rounded-lg font-bold shadow-lg' }, `▶ START ALL (${activeAthletes.length})`),
            e('button', { onClick: handleResetAll, className: 'bg-gray-700 hover:bg-gray-600 text-gray-200 px-4 py-2.5 rounded-lg font-semibold' }, 'Reset'),
            e('button', { onClick: handleExportCSV, className: 'bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2.5 rounded-lg font-semibold' }, 'Export CSV')
          )
        ),

        // Workout Mode Selector
        e('div', { className: 'bg-gray-800 p-4 rounded-xl mb-6 border border-gray-700' },
          e('label', { className: 'block text-xs font-semibold uppercase text-gray-400 mb-2' }, 'Select Workout Mode'),
          e('div', { className: 'grid grid-cols-2 md:grid-cols-4 gap-2' },
            [
              { key: 'EASY', label: 'Easy / Recovery', desc: 'Continuous aerobic pace' },
              { key: 'TEMPO', label: 'Tempo / Threshold', desc: 'Lactate threshold work' },
              { key: 'INTERVAL', label: 'Intervals (VO2max)', desc: '3k-5k race pace reps' },
              { key: 'REP', label: 'Speed Repetitions', desc: 'Shorter, fast economy reps' }
            ].map(mode =>
              e('button', {
                key: mode.key,
                onClick: () => handleWorkoutTypeChange(mode.key),
                className: `p-3 rounded-lg border text-left transition-all ${workoutType === mode.key ? 'bg-indigo-600 border-indigo-400 text-white font-bold' : 'bg-gray-900 border-gray-700 text-gray-300 hover:bg-gray-800'}`
              },
                e('div', { className: 'text-sm font-bold' }, mode.label),
                e('div', { className: 'text-xs opacity-75' }, mode.desc)
              )
            )
          ),

          // Parameter Inputs
          e('div', { className: 'grid grid-cols-1 md:grid-cols-3 gap-4 mt-4 pt-4 border-t border-gray-700' },
            e('div', null,
              e('label', { className: 'block text-xs font-semibold uppercase text-gray-400 mb-1' }, 'Distance (Meters)'),
              e('input', { type: 'number', value: distance, onChange: ev => setDistance(Number(ev.target.value)), className: 'w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-white font-mono outline-none' })
            ),
            e('div', null,
              e('label', { className: 'block text-xs font-semibold uppercase text-gray-400 mb-1' }, 'Reps'),
              e('input', { type: 'number', value: totalReps, onChange: ev => setTotalReps(Number(ev.target.value)), className: 'w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-white font-mono outline-none' })
            ),
            e('div', null,
              e('label', { className: 'block text-xs font-semibold uppercase text-gray-400 mb-1' }, 'Target Rest (Secs)'),
              e('input', { type: 'number', value: targetRest, onChange: ev => setTargetRest(Number(ev.target.value)), className: 'w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-white font-mono outline-none' })
            )
          )
        ),

        // Roster Selection
        e('div', { className: 'bg-gray-800 p-4 rounded-xl border border-gray-700 mb-6' },
          e('h2', { className: 'text-md font-bold text-gray-200 mb-2' }, 'Participating Athletes'),
          e('div', { className: 'flex flex-wrap gap-2' },
            athletes.map(ath =>
              e('label', { key: ath.id, className: `flex items-center gap-2 px-3 py-1.5 rounded-lg border text-sm cursor-pointer transition-all ${ath.selected ? 'bg-indigo-950 border-indigo-500 text-indigo-200 font-semibold' : 'bg-gray-900 border-gray-700 text-gray-400'}` },
                e('input', { type: 'checkbox', checked: ath.selected, onChange: () => toggleAthleteSelection(ath.id), className: 'rounded border-gray-700 text-indigo-600 h-4 w-4' }),
                e('span', null, ath.name),
                e('span', { className: 'text-xs opacity-60' }, `(${ath.vdot} VDOT)`)
              )
            )
          )
        ),

        // Active Timer Grid
        e('div', { className: 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-8' },
          activeAthletes.map(ath => {
            const targetSplitSecs = calculateZoneTargetSplit(ath.vdot, distance, workoutType);
            const currentRepNumber = ath.splits.length + 1;

            return e('div', { key: ath.id, className: `p-5 rounded-xl border ${ath.status === 'running' ? 'bg-gray-800 border-emerald-500 shadow-lg' : ath.status === 'resting' ? 'bg-gray-800 border-amber-500' : 'bg-gray-800 border-gray-700'}` },
              e('div', { className: 'flex justify-between items-start mb-2' },
                e('div', null,
                  e('h3', { className: 'font-bold text-lg text-gray-100' }, ath.name),
                  e('p', { className: 'text-xs text-gray-400' }, 'VDOT: ', e('span', { className: 'font-semibold text-indigo-400' }, ath.vdot), ` | 5K: ${ath.fiveKPR}`)
                ),
                e('span', { className: 'text-xs font-bold px-2.5 py-1 rounded-full bg-gray-900 text-gray-300' }, `Rep ${Math.min(currentRepNumber, totalReps)} / ${totalReps}`)
              ),

              e('div', { className: 'my-4 bg-gray-900 p-3 rounded-lg border border-gray-800' },
                e('div', { className: 'text-xs text-gray-400 flex justify-between mb-1' },
                  e('span', null, `Target (${workoutType}):`),
                  e('span', { className: 'font-mono text-indigo-300 font-semibold' }, formatTime(targetSplitSecs))
                ),
                e('div', { className: 'flex justify-between items-baseline mt-2' },
                  e('div', null,
                    e('div', { className: 'text-xs text-gray-500 uppercase font-semibold' }, 'Rep Time'),
                    e('div', { className: `text-3xl font-mono font-extrabold ${ath.status === 'running' ? 'text-emerald-400' : 'text-gray-200'}` },
                      ath.status === 'running' ? formatTime(ath.currentSplit) : formatTime(ath.splits[ath.splits.length - 1] || 0)
                    )
                  ),
                  ath.status === 'resting' && e('div', { className: 'text-right' },
                    e('div', { className: 'text-xs text-amber-400 uppercase font-semibold' }, 'Resting'),
                    e('div', { className: 'text-2xl font-mono font-bold text-amber-300' }, formatTime(ath.currentRest))
                  )
                )
              ),

              e('div', null,
                ath.status === 'running' && e('button', { onClick: () => handleStopIndividual(ath.id), className: 'w-full bg-red-600 hover:bg-red-500 text-white font-bold py-3 rounded-lg text-lg' }, `STOP REP ${currentRepNumber}`),
                ath.status === 'resting' && e('button', { onClick: () => handleStartNextRep(ath.id), className: 'w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-2.5 rounded-lg' }, `START REP ${currentRepNumber}`)
              ),

              ath.splits.length > 0 && e('div', { className: 'mt-4 pt-3 border-t border-gray-700 flex flex-wrap gap-1.5' },
                ath.splits.map((s, i) => e('span', { key: i, className: 'text-xs font-mono px-2 py-0.5 rounded bg-gray-900 text-indigo-300' }, `R${i+1}: ${formatTime(s)}`))
              )
            );
          })
        ),

        // Add Athlete Form
        e('div', { className: 'bg-gray-800 p-5 rounded-xl border border-gray-700' },
          e('h2', { className: 'text-lg font-bold text-gray-200 mb-3' }, 'Add New Athlete'),
          e('form', { onSubmit: handleAddAthlete, className: 'grid grid-cols-1 md:grid-cols-4 gap-3' },
            e('input', { type: 'text', placeholder: 'Name', value: newAthleteName, onChange: ev => setNewAthleteName(ev.target.value), className: 'bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-white outline-none' }),
            e('input', { type: 'text', placeholder: '5K PR (e.g. 18:30)', value: newAthlete5k, onChange: ev => setNewAthlete5k(ev.target.value), className: 'bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-white outline-none' }),
            e('input', { type: 'number', step: '0.1', placeholder: 'Manual VDOT (Optional)', value: customVdot, onChange: ev => setCustomVdot(ev.target.value), className: 'bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-white outline-none' }),
            e('button', { type: 'submit', className: 'bg-indigo-600 hover:bg-indigo-500 text-white font-bold px-6 py-2 rounded-lg' }, 'Add Athlete')
          )
        )
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(e(App));
  </script>
</body>
</html>
